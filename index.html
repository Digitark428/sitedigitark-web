<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>DIGIT'ΛRK — City Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;
    --white:#fff;
    --mute:#8c8c92;
    --line:rgba(255,255,255,.14);
    --cyan:#7fdfff;
    --glass:rgba(10,10,12,.72);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);overflow:hidden;color:var(--white);
    font-family:'Sora',-apple-system,sans-serif;}
  canvas{display:block;}
  #app{position:fixed;inset:0;}

  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes sweep{0%{left:-60%;}100%{left:130%;}}

  /* ---------- shared overlay ---------- */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#000;z-index:30;text-align:center;padding:24px;
    transition:opacity .9s ease;}
  .screen.hide{opacity:0;pointer-events:none;}

  /* wordmark */
  .wordmark{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.02em;
    background:linear-gradient(180deg,#fff 0%,#fff 45%,#9a9aa0 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;position:relative;}
  .wordmark .dot{color:#fff;-webkit-text-fill-color:#fff;}

  /* ---------- intro ---------- */
  #intro .wordmark{font-size:clamp(44px,11vw,108px);opacity:0;animation:rise 1.2s .25s forwards;}
  #intro .sweep{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  #intro .sweep::after{content:"";position:absolute;top:-40%;left:-60%;width:40%;height:180%;
    transform:rotate(18deg);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
    animation:sweep 3.4s 1.1s ease-in-out infinite;}
  #intro .tag{margin-top:26px;font-weight:300;font-size:clamp(15px,4.4vw,21px);
    line-height:1.5;color:#cfcfd4;max-width:440px;opacity:0;animation:rise 1.1s .8s forwards;}
  .cta{margin-top:42px;padding:15px 40px;border:1px solid rgba(255,255,255,.55);
    border-radius:60px;background:transparent;color:#fff;font-family:'Sora';font-size:16px;
    font-weight:400;letter-spacing:.02em;cursor:pointer;opacity:0;animation:rise 1.1s 1.3s forwards;
    transition:background .35s,border-color .35s,letter-spacing .35s;}
  .cta:hover{background:#fff;color:#000;letter-spacing:.06em;}

  /* ---------- avatar select ---------- */
  #avatar{gap:8px;}
  #avatar .label{font-weight:300;letter-spacing:.32em;text-transform:uppercase;
    font-size:13px;color:var(--mute);}
  #avatar h2{font-family:'Syne';font-weight:700;font-size:clamp(26px,7vw,44px);margin-bottom:34px;}
  .cards{display:flex;gap:clamp(14px,4vw,34px);flex-wrap:wrap;justify-content:center;}
  .card{width:clamp(140px,40vw,210px);aspect-ratio:3/4.4;border:1px solid var(--line);
    border-radius:18px;background:linear-gradient(180deg,#0d0d10,#050506);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:18px;cursor:pointer;position:relative;overflow:hidden;
    transition:transform .4s cubic-bezier(.2,.8,.2,1),border-color .4s,box-shadow .4s;}
  .card:hover{transform:translateY(-8px);border-color:rgba(127,223,255,.6);
    box-shadow:0 24px 60px -20px rgba(127,223,255,.35);}
  .card svg{position:absolute;top:8%;left:50%;transform:translateX(-50%);height:64%;}
  .card .nm{font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-size:13px;z-index:2;}
  .card .pick{font-size:11px;color:var(--mute);margin-top:4px;z-index:2;letter-spacing:.04em;}
  .card::before{content:"";position:absolute;bottom:0;left:0;right:0;height:55%;
    background:radial-gradient(70% 90% at 50% 120%,rgba(127,223,255,.16),transparent);
    opacity:0;transition:opacity .4s;}
  .card:hover::before{opacity:1;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity 1s;}
  #hud.on{opacity:1;}
  .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:18px 22px;}
  .topbar .wordmark{font-size:22px;}
  .hint{font-size:11px;color:var(--mute);letter-spacing:.16em;text-transform:uppercase;
    text-align:right;line-height:1.7;}
  .toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Syne';font-weight:700;font-size:clamp(20px,6vw,34px);letter-spacing:.04em;
    opacity:0;transition:opacity .6s,transform .6s;text-shadow:0 0 30px rgba(0,0,0,.8);}
  .toast.show{opacity:1;}
  .toast small{display:block;font-family:'Sora';font-weight:300;font-size:13px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--cyan);margin-top:10px;}

  /* proximity prompt */
  #prompt{position:absolute;left:50%;bottom:130px;transform:translateX(-50%) translateY(14px);
    pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:0;transition:opacity .3s,transform .3s;}
  #prompt.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #prompt .pname{font-family:'Syne';font-weight:700;font-size:18px;letter-spacing:.02em;}
  #prompt .enter{padding:12px 28px;border:1px solid rgba(255,255,255,.55);border-radius:50px;
    background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:#fff;font-family:'Sora';
    font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;
    transition:background .3s,color .3s;}
  #prompt .enter:hover{background:#fff;color:#000;}
  #prompt .key{display:inline-flex;align-items:center;justify-content:center;min-width:22px;
    height:22px;padding:0 6px;border:1px solid currentColor;border-radius:6px;font-size:11px;}

  /* joystick (mobile) */
  #stick{position:absolute;left:26px;bottom:34px;width:118px;height:118px;border-radius:50%;
    border:1px solid var(--line);background:rgba(255,255,255,.03);display:none;pointer-events:auto;
    touch-action:none;}
  #stick .thumb{position:absolute;left:50%;top:50%;width:46px;height:46px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(255,255,255,.85);
    box-shadow:0 0 24px rgba(127,223,255,.5);}

  /* ---------- service panel ---------- */
  #panel{position:fixed;z-index:25;background:var(--glass);backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);border:1px solid var(--line);
    display:flex;flex-direction:column;color:#fff;transition:transform .55s cubic-bezier(.2,.8,.2,1);}
  /* desktop: right drawer */
  #panel{top:0;right:0;height:100%;width:min(440px,92vw);transform:translateX(105%);
    border-left:1px solid var(--line);}
  #panel.open{transform:translateX(0);}
  .pclose{position:absolute;top:16px;right:18px;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--line);background:transparent;color:#fff;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .3s;z-index:3;}
  .pclose:hover{background:rgba(255,255,255,.1);}
  .pscroll{overflow-y:auto;padding:54px 30px 30px;height:100%;}
  .pkicker{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--cyan);}
  .ptitle{font-family:'Syne';font-weight:800;font-size:clamp(28px,6vw,40px);
    line-height:1.02;margin:10px 0 6px;}
  .psub{font-weight:300;color:#cfcfd4;font-size:15px;margin-bottom:24px;font-style:italic;}
  .price-row{display:flex;justify-content:space-between;align-items:baseline;gap:14px;
    padding:18px 0;border-top:1px solid var(--line);}
  .price-row:last-of-type{border-bottom:1px solid var(--line);}
  .pr-name{font-weight:600;font-size:16px;letter-spacing:.01em;}
  .pr-desc{font-weight:300;font-size:13px;color:var(--mute);margin-top:3px;line-height:1.45;}
  .pr-tag{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--cyan);border:1px solid rgba(127,223,255,.4);
    border-radius:30px;padding:3px 9px;}
  .pr-price{font-family:'Syne';font-weight:700;font-size:clamp(22px,6vw,30px);white-space:nowrap;}
  .pr-price s{font-family:'Sora';font-weight:300;font-size:14px;color:var(--mute);display:block;
    text-align:right;}
  .bullets{margin:22px 0 4px;display:flex;flex-direction:column;gap:11px;}
  .bullets div{font-weight:300;font-size:14px;color:#d7d7db;display:flex;gap:11px;line-height:1.4;}
  .bullets div::before{content:"";flex:0 0 6px;height:6px;margin-top:7px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:24px 0 8px;}
  .gtile{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);
    background:linear-gradient(135deg,#161620,#08080c);position:relative;overflow:hidden;}
  .gtile::after{content:"";position:absolute;inset:0;
    background:radial-gradient(60% 60% at 30% 20%,rgba(127,223,255,.18),transparent);}
  .gcap{font-size:11px;color:var(--mute);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
  .quote{margin:24px 0;padding:18px;border-left:2px solid var(--cyan);
    background:rgba(255,255,255,.03);border-radius:0 10px 10px 0;font-weight:300;
    font-size:14px;line-height:1.55;color:#e3e3e6;}
  .quote span{display:block;margin-top:8px;font-size:12px;color:var(--mute);letter-spacing:.06em;}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:26px;}
  .btn{padding:15px;border-radius:50px;text-align:center;font-size:15px;cursor:pointer;
    text-decoration:none;display:block;transition:transform .25s,filter .25s,background .25s,color .25s;}
  .btn:active{transform:scale(.98);}
  .btn-wa{background:linear-gradient(135deg,#fff,#d6d6da);color:#000;font-weight:600;}
  .btn-wa:hover{filter:brightness(1.05);}
  .btn-rdv{border:1px solid rgba(255,255,255,.5);color:#fff;font-weight:400;}
  .btn-rdv:hover{background:#fff;color:#000;}

  /* mobile layout */
  @media (max-width:640px){
    #panel{top:auto;bottom:0;right:0;left:0;width:100%;height:86%;border-left:none;
      border-top:1px solid var(--line);border-radius:22px 22px 0 0;transform:translateY(105%);}
    #panel.open{transform:translateY(0);}
    .topbar .hint{display:none;}
  }
  .nojs{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<!-- INTRO -->
<section id="intro" class="screen">
  <div class="sweep"></div>
  <div class="wordmark">DIGIT'ΛRK<span class="dot">.</span></div>
  <p class="tag">Transformer votre présence digitale en machine à clients.</p>
  <button class="cta" id="discover">Découvrir</button>
</section>

<!-- AVATAR -->
<section id="avatar" class="screen hide">
  <div class="label">Étape 01</div>
  <h2>Choisissez votre avatar</h2>
  <div class="cards">
    <div class="card" data-av="homme">
      <svg viewBox="0 0 100 150" fill="none">
        <circle cx="50" cy="26" r="16" fill="#1a1a1f" stroke="#3a3a42"/>
        <path d="M24 150 V96 q0-30 26-30 t26 30 V150" fill="#0e0e12" stroke="#3a3a42"/>
        <path d="M50 66 V150" stroke="#7fdfff" stroke-opacity=".35"/>
        <path d="M24 104 H76" stroke="#7fdfff" stroke-opacity=".25"/>
      </svg>
      <div class="nm">Homme</div>
      <div class="pick">Sélectionner</div>
    </div>
    <div class="card" data-av="femme">
      <svg viewBox="0 0 100 150" fill="none">
        <circle cx="50" cy="26" r="15" fill="#1a1a1f" stroke="#3a3a42"/>
        <path d="M30 150 L40 70 q10-12 20 0 L70 150 Z" fill="#0e0e12" stroke="#3a3a42"/>
        <path d="M50 66 V150" stroke="#7fdfff" stroke-opacity=".35"/>
        <path d="M37 96 H63" stroke="#7fdfff" stroke-opacity=".25"/>
      </svg>
      <div class="nm">Femme</div>
      <div class="pick">Sélectionner</div>
    </div>
  </div>
</section>

<!-- HUD -->
<div id="hud">
  <div class="topbar">
    <div class="wordmark">DIGIT'ΛRK<span class="dot">.</span></div>
    <div class="hint">Avancez · Z Q S D / Flèches / joystick<br>Entrer un bâtiment · E</div>
  </div>
  <div class="toast" id="toast">Bienvenue dans DIGIT'ΛRK CITY<small>Avancez tout droit dans l'avenue</small></div>
  <div id="prompt">
    <div class="pname"></div>
    <button class="enter">Entrer <span class="key">E</span></button>
  </div>
  <div id="stick"><div class="thumb"></div></div>
</div>

<!-- SERVICE PANEL -->
<aside id="panel">
  <button class="pclose" aria-label="Fermer">✕</button>
  <div class="pscroll" id="pbody"></div>
</aside>

// étalonnage cinématique final : contraste, teinte froide, vignette, encodage sRGB
const GradeShader = {
  uniforms: {
    tDiffuse: { value: null },
    uContrast: { value: 1.07 },
    uTint: { value: new THREE.Color(0xbcd4ff) },
    uVignette: { value: 0.78 }
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uContrast;
    uniform vec3  uTint;
    uniform float uVignette;
    varying vec2 vUv;
    void main(){
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      // contraste doux autour du gris moyen
      c = (c - 0.5) * uContrast + 0.5;
      // teinte froide légère dans les ombres
      float l = dot(c, vec3(0.299,0.587,0.114));
      c = mix(c, c * uTint, (1.0 - smoothstep(0.0,0.55,l)) * 0.14);
      // vignette cinématique
      float d = length(vUv - 0.5);
      c *= smoothstep(0.92, uVignette*0.55, d) * 0.30 + 0.70;
      // encodage sRGB (pipeline linéaire -> écran)
      c = clamp(c, 0.0, 1.0);
      c = pow(c, vec3(1.0/2.2));
      gl_FragColor = vec4(c, 1.0);
    }`
};

/* pipeline post-process : bloom cinématique + étalonnage + FXAA.
   Robuste : si les modules CDN ne se chargent pas, on retombe sur le rendu direct. */
function setupPostProcessing(){
  try {
    if(typeof THREE.EffectComposer === 'undefined' ||
       typeof THREE.RenderPass === 'undefined' ||
       typeof THREE.UnrealBloomPass === 'undefined' ||
       typeof THREE.ShaderPass === 'undefined'){
      composer = null; return;
    }
    const w = window.innerWidth, h = window.innerHeight;
    const pr = renderer.getPixelRatio();            // 1 sur écran standard, 2 sur Retina/4K
    composer = new THREE.EffectComposer(renderer);
    // CRITIQUE : render targets en résolution physique (w*pr × h*pr),
    // sinon le composer rend 4× trop petit sur écran Retina → tout pixelisé.
    composer.setSize(w * pr, h * pr);
    composer.addPass(new THREE.RenderPass(scene, camera));

    // bloom : halo lumineux réaliste sur LED / tour / sculpture (cœur du rendu "jeu")
    // rendu à demi-résolution : halo quasi identique, coût GPU bien moindre (fluidité, surtout Safari)
    bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(Math.round(w*pr*0.5), Math.round(h*pr*0.5)), 0.62, 0.55, 0.72);
    composer.addPass(bloomPass);

    // étalonnage cinématique (contraste, teinte froide, vignette, sRGB)
    composer.addPass(new THREE.ShaderPass(GradeShader));

    // anti-aliasing FXAA en dernier (rendu net sur l'image finale)
    if(typeof THREE.FXAAShader !== 'undefined'){
      fxaaPass = new THREE.ShaderPass(THREE.FXAAShader);
      fxaaPass.material.uniforms['resolution'].value.set(1/(w*pr), 1/(h*pr));
      composer.addPass(fxaaPass);
    }
  } catch(e){
    composer = null;   // fallback : rendu direct
  }
}

/* ============================================================
   CIEL — dôme dégradé futuriste + faisceaux lointains
   ============================================================ */
function buildSky(){
  const skyGeo = new THREE.SphereGeometry(560, 32, 24);
  skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{
      uTime:{value:0},
      topColor:{value:new THREE.Color(0x05070e)},
      bottomColor:{value:new THREE.Color(0x020306)},
      horizonColor:{value:new THREE.Color(0x1b3a5e)}
    },
    vertexShader:`
      varying vec3 vDir;
      void main(){
        vDir = normalize((modelMatrix * vec4(position,1.0)).xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader:`
      precision highp float;
      varying vec3 vDir;
      uniform vec3 topColor, bottomColor, horizonColor;
      uniform float uTime;
      // bruit léger pour casser le banding (brume)
      float hash(vec2 p){ return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5); }
      void main(){
        float h = vDir.y;                              // -1..1
        vec3 base = mix(bottomColor, topColor, smoothstep(-0.25, 0.85, h));
        // halo doux sur l'horizon (lueur de ville lointaine, sobre)
        float glow = exp(-abs(h)*5.0);
        // concentration douce du halo vers l'avant (+Z, derrière la tour)
        float front = smoothstep(-0.2, 1.0, vDir.z) * 0.6 + 0.4;
        base += horizonColor * glow * 0.55 * front;
        // grain subtil
        base += (hash(gl_FragCoord.xy*0.5) - 0.5) * 0.012;
        gl_FragColor = vec4(base, 1.0);
      }`
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  skyMesh = sky;
  scene.add(sky);

  // faisceaux lumineux lointains (projecteurs), lents et discrets
  const cfg = [[-70,150,-0.16],[64,165,0.2],[-110,185,-0.1],[28,210,0.14],[120,175,0.22]];
  cfg.forEach((c,i)=>{
    const geo = new THREE.CylinderGeometry(0.8, 4.0, 260, 10, 1, true);
    const m = new THREE.MeshBasicMaterial({color:0x9fc4ff, transparent:true, opacity:0.05,
      side:THREE.DoubleSide, depthWrite:false, fog:false, blending:THREE.AdditiveBlending});
    const beam = new THREE.Mesh(geo, m);
    beam.position.set(c[0], 70, c[1]);
    beam.rotation.z = c[2];
    beam.userData = {baseRot:c[2], phase:i*1.27, amp:0.06+0.03*(i%2)};
    scene.add(beam);
    skyBeams.push(beam);
  });
}

/* silhouette de ville lointaine -> profondeur visuelle (pure ambiance, non interactif) */
function buildDistantSkyline(){
  const mat = new THREE.MeshStandardMaterial({color:0x070a12, metalness:0.6, roughness:0.5,
    emissive:0x0b1626, emissiveIntensity:0.25});
  const capMat = new THREE.MeshBasicMaterial({color:0x6f9fd0, transparent:true, opacity:0.35, fog:true});
  for(let i=0;i<26;i++){
    const ang = (i/26)*Math.PI*2;
    const rad = 120 + Math.random()*90;
    const px = Math.cos(ang)*rad;
    const pz = 60 + Math.sin(ang)*rad;   // centré un peu vers l'avant
    if(pz < 90 && Math.abs(px) < 60) continue;  // garder l'avenue dégagée
    const bw = 5 + Math.random()*9;
    const bh = 18 + Math.random()*64;
    const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bw), mat);
    b.position.set(px, bh/2, pz);
    scene.add(b);
    // fine corniche lumineuse en haut
    const cap = new THREE.Mesh(new THREE.BoxGeometry(bw*0.9, 0.4, bw*0.9), capMat);
    cap.position.set(px, bh, pz);
    scene.add(cap);
  }
}

/* glossy reflective floor (illusion via mirrored ghosts + glossy plane) */
let reflectionGroup;
/* ============================================================
   SOL ULTRA-NOIR — effet dalle mouillée premium
   Reflets via 2 couches : PBR (spéculaire directionnel) +
   fantômes renversés (reflectionGroup) visibles par transparence
   ============================================================ */
/* ============================================================
   SOL — réflecteur planaire TEMPS RÉEL (dalle mouillée premium)
   La scène est re-rendue chaque frame depuis une caméra miroir
   sous le sol -> vrais reflets de la tour, des LED, des lumières.
   Par-dessus : shader de grandes dalles (joints, micro-relief humide).
   ============================================================ */
function buildFloor(){
  // ancien groupe de reflets "fantômes" conservé mais désactivé
  // (les reflets sont maintenant calculés en temps réel)
  reflectionGroup = new THREE.Group();
  reflectionGroup.scale.y = -1;
  reflectionGroup.visible = false;
  scene.add(reflectionGroup);

  const geo = new THREE.PlaneGeometry(600, 600);
  const floor = createReflectorFloor(geo, { textureWidth: 1024, textureHeight: 1024 });
  floor.rotation.x = -Math.PI/2;
  floor.position.y = 0;
  floor.renderOrder = 0;
  scene.add(floor);
  floorReflector = floor;
}

/* réflecteur planaire (porté de THREE.Reflector r128 + shader dalles maison) */
function createReflectorFloor(geometry, options){
  options = options || {};
  const textureWidth  = options.textureWidth  || 1024;
  const textureHeight = options.textureHeight || 1024;
  const clipBias = 0.003;

  const reflectorPlane = new THREE.Plane();
  const normal = new THREE.Vector3();
  const reflectorWorldPosition = new THREE.Vector3();
  const cameraWorldPosition = new THREE.Vector3();
  const rotationMatrix = new THREE.Matrix4();
  const lookAtPosition = new THREE.Vector3(0, 0, -1);
  const clipPlane = new THREE.Vector4();
  const view = new THREE.Vector3();
  const target = new THREE.Vector3();
  const q = new THREE.Vector4();
  const textureMatrix = new THREE.Matrix4();
  const virtualCamera = new THREE.PerspectiveCamera();

  const renderTarget = new THREE.WebGLRenderTarget(textureWidth, textureHeight, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat
  });
  renderTarget.texture.generateMipmaps = false;
  // RT laissée en encodage linéaire : l'encodage sRGB est appliqué une seule fois
  // en fin de pipeline (GradeShader), pour rester cohérent avec le composer.

  const material = new THREE.ShaderMaterial({
    uniforms: {
      tDiffuse:      { value: renderTarget.texture },
      textureMatrix: { value: textureMatrix },
      uReflStrength: { value: 0.58 },                              // intensité reflet (mouillé, pas miroir parfait)
      uBaseColor:    { value: new THREE.Color(0x05070d) },          // dalle quasi-noire
      uTileSize:     { value: 6.0 }                                 // grandes dalles
    },
    vertexShader: `
      uniform mat4 textureMatrix;
      varying vec4 vUv;
      varying vec2 vWorldXZ;
      void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldXZ = wp.xz;
        vUv = textureMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      precision highp float;
      uniform sampler2D tDiffuse;
      uniform float uReflStrength;
      uniform vec3  uBaseColor;
      uniform float uTileSize;
      varying vec4 vUv;
      varying vec2 vWorldXZ;
      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float vnoise(vec2 p){
        vec2 i=floor(p), f=fract(p);
        vec2 u=f*f*(3.0-2.0*f);
        return mix(mix(hash(i+vec2(0.,0.)),hash(i+vec2(1.,0.)),u.x),
                   mix(hash(i+vec2(0.,1.)),hash(i+vec2(1.,1.)),u.x),u.y);
      }
      float fbm(vec2 p){
        float v=0.0, a=0.5;
        for(int i=0;i<4;i++){ v+=a*vnoise(p); p*=2.02; a*=0.5; }
        return v;
      }
      void main(){
        // ---- grandes dalles + joints fins ----
        vec2 t = vWorldXZ / uTileSize;
        vec2 cell = floor(t);
        vec2 gg = abs(fract(t) - 0.5);
        float edge = max(gg.x, gg.y);
        float seam = smoothstep(0.47, 0.5, edge);
        float tileVar = 0.85 + 0.30 * hash(cell);

        // ---- texture pierre / marbre (micro-détails crédibles) ----
        float nLarge  = fbm(vWorldXZ * 0.45);
        float nDetail = fbm(vWorldXZ * 2.20);
        // veines de marbre (domain warp -> stries irrégulières)
        float veins = pow(abs(sin((vWorldXZ.x*0.5 + vWorldXZ.y*0.32) + nLarge*5.0)), 2.2);
        float mottle = clamp(nLarge*0.6 + nDetail*0.4, 0.0, 1.0);
        vec3 stoneLight = vec3(0.055,0.066,0.088);          // charbon haut de gamme
        vec3 stone = mix(uBaseColor * tileVar, stoneLight, mottle*0.5);
        stone += vec3(0.012,0.014,0.020) * veins * 0.7;     // veines légèrement bleutées
        stone = mix(stone, uBaseColor*0.22, seam);          // joints sombres

        // ---- humidité variable : zones mouillées plus réfléchissantes ----
        float wet = 0.58 + 0.42 * fbm(vWorldXZ*0.6 + 7.0);
        // micro-relief -> distorsion du reflet (nette sur zones très humides)
        vec2 uv = vUv.xy / vUv.w;
        uv += (nDetail - 0.5) * 0.006 * (1.3 - wet);
        vec3 refl = texture2D(tDiffuse, uv).rgb;

        float reflMask = wet * mix(1.0, 0.40, seam);
        vec3 col = stone + refl * uReflStrength * reflMask;

        gl_FragColor = vec4(col, 1.0);
      }`
  });

  const reflector = new THREE.Mesh(geometry, material);

  reflector.onBeforeRender = function(renderer, scene, camera){
    if(camera === virtualCamera) return;   // pas de récursion

    reflectorWorldPosition.setFromMatrixPosition(reflector.matrixWorld);
    cameraWorldPosition.setFromMatrixPosition(camera.matrixWorld);
    rotationMatrix.extractRotation(reflector.matrixWorld);
    normal.set(0, 0, 1).applyMatrix4(rotationMatrix);

    view.subVectors(reflectorWorldPosition, cameraWorldPosition);
    if(view.dot(normal) > 0) return;       // caméra derrière le miroir
    view.reflect(normal).negate().add(reflectorWorldPosition);

    rotationMatrix.extractRotation(camera.matrixWorld);
    lookAtPosition.set(0, 0, -1).applyMatrix4(rotationMatrix).add(cameraWorldPosition);
    target.subVectors(reflectorWorldPosition, lookAtPosition);
    target.reflect(normal).negate().add(reflectorWorldPosition);

    virtualCamera.position.copy(view);
    virtualCamera.up.set(0, 1, 0).applyMatrix4(rotationMatrix).reflect(normal);
    virtualCamera.lookAt(target);
    virtualCamera.far = camera.far;
    virtualCamera.updateMatrixWorld();
    virtualCamera.matrixWorldInverse.copy(virtualCamera.matrixWorld).invert();
    virtualCamera.projectionMatrix.copy(camera.projectionMatrix);

    // matrice de projection de texture (object space -> UV reflet)
    textureMatrix.set(0.5,0.0,0.0,0.5, 0.0,0.5,0.0,0.5, 0.0,0.0,0.5,0.5, 0.0,0.0,0.0,1.0);
    textureMatrix.multiply(virtualCamera.projectionMatrix);
    textureMatrix.multiply(virtualCamera.matrixWorldInverse);
    textureMatrix.multiply(reflector.matrixWorld);

    // plan de clipping oblique (évite de refléter ce qui est sous le sol)
    reflectorPlane.setFromNormalAndCoplanarPoint(normal, reflectorWorldPosition);
    reflectorPlane.applyMatrix4(virtualCamera.matrixWorldInverse);
    clipPlane.set(reflectorPlane.normal.x, reflectorPlane.normal.y, reflectorPlane.normal.z, reflectorPlane.constant);
    const pm = virtualCamera.projectionMatrix;
    q.x = (Math.sign(clipPlane.x) + pm.elements[8]) / pm.elements[0];
    q.y = (Math.sign(clipPlane.y) + pm.elements[9]) / pm.elements[5];
    q.z = -1.0;
    q.w = (1.0 + pm.elements[10]) / pm.elements[14];
    clipPlane.multiplyScalar(2.0 / clipPlane.dot(q));
    pm.elements[2]  = clipPlane.x;
    pm.elements[6]  = clipPlane.y;
    pm.elements[10] = clipPlane.z + 1.0 - clipBias;
    pm.elements[14] = clipPlane.w;

    const currentRT = renderer.getRenderTarget();
    const currentShadowAutoUpdate = renderer.shadowMap.autoUpdate;
    reflector.visible = false;
    renderer.shadowMap.autoUpdate = false;     // réutilise la shadow map existante
    renderer.setRenderTarget(renderTarget);
    if(renderer.autoClear === false) renderer.clear();
    renderer.render(scene, virtualCamera);
    renderer.shadowMap.autoUpdate = currentShadowAutoUpdate;
    renderer.setRenderTarget(currentRT);
    reflector.visible = true;
  };

  return reflector;
}

/* ============================================================
   AVENUE PREMIUM — lignes LED + éclairage sol intégré
   Objectif : route mouillée haut de gamme comme la photo ref.
   ============================================================ */
function buildAvenue(){
  const len = 102, cz = 30;

  // ---- 2 lignes LED guides (blanc froid, très lumineuses) ----
  // Parallèles -> convergence naturelle en perspective vers la tour
  [-3.8, 3.8].forEach(x=>{
    // corps de la ligne LED (fine, ultra-lumineuse)
    const line = new THREE.Mesh(
      new THREE.PlaneGeometry(0.13, len),
      new THREE.MeshBasicMaterial({color:0xf0faff, fog:false}));
    line.rotation.x = -Math.PI/2;
    line.position.set(x, 0.06, cz);
    scene.add(line);

    // halo proche (1er anneau de lumière sur la dalle)
    const h1 = new THREE.Mesh(
      new THREE.PlaneGeometry(1.6, len),
      new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:0.14,
        blending:THREE.AdditiveBlending, depthWrite:false, fog:false}));
    h1.rotation.x = -Math.PI/2;
    h1.position.set(x, 0.05, cz);
    scene.add(h1);

    // halo large (diffusion douce sur la dalle mouillée)
    const h2 = new THREE.Mesh(
      new THREE.PlaneGeometry(4.0, len),
      new THREE.MeshBasicMaterial({color:0x7fc8f0, transparent:true, opacity:0.055,
        blending:THREE.AdditiveBlending, depthWrite:false, fog:false}));
    h2.rotation.x = -Math.PI/2;
    h2.position.set(x, 0.04, cz);
    scene.add(h2);

    // reflet dans le sol (reflectionGroup, haute opacité = reflet net)
    const ghost = new THREE.Mesh(
      new THREE.PlaneGeometry(0.13, len),
      new THREE.MeshBasicMaterial({color:0xe8f6ff, transparent:true, opacity:0.82, fog:false}));
    ghost.rotation.x = -Math.PI/2;
    ghost.position.set(x, 0.06, cz);
    reflectionGroup.add(ghost);

    // reflet du halo (diffusion dans la dalle)
    const ghostHalo = new THREE.Mesh(
      new THREE.PlaneGeometry(2.5, len),
      new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:0.22,
        blending:THREE.AdditiveBlending, depthWrite:false, fog:false}));
    ghostHalo.rotation.x = -Math.PI/2;
    ghostHalo.position.set(x, 0.05, cz);
    reflectionGroup.add(ghostHalo);
  });

  // ---- spots encastrés (downlights architecturaux, façon référence) ----
  // entre les lignes LED (±3.8) et les bords (±8) -> x ≈ ±5.7
  for(let z=1; z<=70; z+=5){
    [-5.7, 5.7].forEach(x=>{
      // anneau sombre encastré (logement du spot)
      const housing = new THREE.Mesh(
        new THREE.CylinderGeometry(0.20, 0.20, 0.03, 20),
        new THREE.MeshStandardMaterial({color:0x0b0d12, metalness:0.6, roughness:0.4}));
      housing.position.set(x, 0.03, z);
      scene.add(housing);
      // disque lumineux central (blanc froid, vif)
      const dot = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.12, 0.05, 20),
        new THREE.MeshBasicMaterial({color:0xf4fbff, fog:false}));
      dot.position.set(x, 0.045, z);
      scene.add(dot);
      // halo net au sol autour du spot
      const glow = new THREE.Mesh(
        new THREE.CircleGeometry(0.7, 24),
        new THREE.MeshBasicMaterial({color:0xcfeeff, transparent:true, opacity:0.22,
          blending:THREE.AdditiveBlending, depthWrite:false, fog:false}));
      glow.rotation.x = -Math.PI/2;
      glow.position.set(x, 0.05, z);
      scene.add(glow);
    });
  }

  // ---- marqueurs de bord (séparation avenue / décor latéral) ----
  [-AVENUE_HALF, AVENUE_HALF].forEach(x=>{
    const edge = new THREE.Mesh(
      new THREE.PlaneGeometry(0.08, len),
      new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:0.45, fog:false}));
    edge.rotation.x = -Math.PI/2;
    edge.position.set(x, 0.05, cz);
    scene.add(edge);
  });
}

function edgeLines(geo, color, opacity){
  const e = new THREE.EdgesGeometry(geo);
  const m = new THREE.LineBasicMaterial({color, transparent:true, opacity});
  return new THREE.LineSegments(e, m);
}

function buildDistrict(d){
  const [w,h,dp] = d.size;
  const group = new THREE.Group();
  group.position.set(d.pos[0],0,d.pos[1]);
  if(d.rotY) group.rotation.y = d.rotY;   // rotation "hero" -> façade visible depuis l'avenue

  if(d.tower) buildTowerMonument(group, d);
  else if(d.id === 'video') buildVideoBuilding(group, d);
  else if(d.id === 'reels') buildReelsBuilding(group, d);
  else        buildSimpleBlock(group, d);

  // ground halo (zone d'interaction) — commun
  const hr = d._haloR || Math.max(w,dp)*0.7;
  const halo = new THREE.Mesh(
    new THREE.RingGeometry(hr, hr+0.4, 64),
    new THREE.MeshBasicMaterial({color:d.accent, transparent:true, opacity:0.0, side:THREE.DoubleSide}));
  halo.rotation.x = -Math.PI/2; halo.position.y = 0.06;
  group.add(halo);
  d._halo = halo;

  scene.add(group);
  d._group = group;
  d._radius = d.tower ? 12 : (Math.max(w,dp)*0.7 + 3.2);
  buildings.push(d);
}

/* bâtiment placeholder (sera finalisé plus tard, district par district) */
function buildSimpleBlock(group, d){
  const [w,h,dp] = d.size;
  const [x,z] = d.pos;
  const geo = new THREE.BoxGeometry(w,h,dp);
  const mat = new THREE.MeshStandardMaterial({
    color: d.hub ? 0xeef1f6 : 0xe3e7ee,
    metalness:0.35, roughness:0.5,
    emissive: new THREE.Color(d.accent), emissiveIntensity:0.05
  });
  const box = new THREE.Mesh(geo, mat);
  box.position.y = h/2;
  box.castShadow = true; box.receiveShadow = true;
  group.add(box);

  const edges = edgeLines(geo, d.accent, 0.7);
  edges.position.y = h/2;
  group.add(edges);

  const crown = new THREE.Mesh(
    new THREE.BoxGeometry(w*0.78,0.5,dp*0.78),
    new THREE.MeshBasicMaterial({color:d.accent, transparent:true, opacity:0.9}));
  crown.position.y = h+0.5;
  group.add(crown);

  d._mat = mat; d._box = box; d._edges = edges;
  d._haloR = Math.max(w,dp)*0.7;

  // reflet
  const ghostMat = mat.clone(); ghostMat.transparent=true; ghostMat.opacity=0.42;
  const ghost = new THREE.Mesh(geo, ghostMat);
  ghost.position.set(x, h/2, z);
  reflectionGroup.add(ghost);
}

// panneaux métal noir premium : panneaux 4×4, micro-imperfections, coulures,
// micro-pores, joints sombres, ombrage interne — fidèle à la référence.
function makeMetalTexture(){
  const S=1024;
  const cv=document.createElement('canvas'); cv.width=S; cv.height=S;
  const x=cv.getContext('2d');
  // fond très sombre uniforme (base anthracite quasi-noir)
  x.fillStyle='#0d1015'; x.fillRect(0,0,S,S);

  const N=4;                  // 4×4 panneaux
  const P=S/N;                // 256 px par panneau

  for(let py=0; py<N; py++){
    for(let px=0; px<N; px++){
      const X0=px*P, Y0=py*P;

      // 1) tint de base légèrement variable par panneau
      const tint = 14 + Math.floor(Math.random()*6);   // 14..19
      x.fillStyle = 'rgb('+tint+','+(tint+2)+','+(tint+5)+')';
      x.fillRect(X0, Y0, P, P);

      // 2) léger éclairage diagonal (effet de matière)
      const grad = x.createLinearGradient(X0, Y0, X0+P, Y0+P);
      grad.addColorStop(0, 'rgba(255,255,255,0.025)');
      grad.addColorStop(0.5,'rgba(255,255,255,0.00)');
      grad.addColorStop(1, 'rgba(0,0,0,0.10)');
      x.fillStyle = grad;
      x.fillRect(X0, Y0, P, P);

      // 3) coulures verticales subtiles (5–7 par panneau)
      const nDrips = 5 + ((Math.random()*3)|0);
      for(let i=0;i<nDrips;i++){
        const sx = X0 + 8 + Math.random()*(P-16);
        const sy = Y0 + Math.random()*P*0.35;
        const sLen = P*(0.30 + Math.random()*0.55);
        const g = x.createLinearGradient(sx, sy, sx, sy+sLen);
        g.addColorStop(0,   'rgba(255,255,255,0)');
        g.addColorStop(0.35,'rgba(255,255,255,0.035)');
        g.addColorStop(0.70,'rgba(0,0,0,0.06)');
        g.addColorStop(1,   'rgba(0,0,0,0.12)');
        x.fillStyle=g; x.fillRect(sx-1, sy, 2, sLen);
      }

      // 4) micro-pores / piqûres (60 par panneau)
      for(let i=0;i<60;i++){
        const dx = X0 + Math.random()*P;
        const dy = Y0 + Math.random()*P;
        const dr = 0.4 + Math.random()*1.4;
        x.fillStyle = 'rgba(0,0,0,'+(0.10+Math.random()*0.22)+')';
        x.beginPath(); x.arc(dx,dy,dr,0,Math.PI*2); x.fill();
      }

      // 5) 2 légères auréoles claires (smudges)
      for(let i=0;i<2;i++){
        const cx = X0 + P*(0.25+Math.random()*0.5);
        const cy = Y0 + P*(0.25+Math.random()*0.5);
        const cr = P*(0.18+Math.random()*0.22);
        const gr2 = x.createRadialGradient(cx, cy, 0, cx, cy, cr);
        gr2.addColorStop(0, 'rgba(255,255,255,0.035)');
        gr2.addColorStop(1, 'rgba(255,255,255,0)');
        x.fillStyle = gr2;
        x.beginPath(); x.arc(cx,cy,cr,0,Math.PI*2); x.fill();
      }

      // 6) ombre interne haut/gauche (effet panneau légèrement encastré)
      const sh1 = x.createLinearGradient(X0, Y0, X0, Y0+22);
      sh1.addColorStop(0,'rgba(0,0,0,0.32)');
      sh1.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle=sh1; x.fillRect(X0, Y0, P, 22);
      const sh2 = x.createLinearGradient(X0, Y0, X0+18, Y0);
      sh2.addColorStop(0,'rgba(0,0,0,0.22)');
      sh2.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle=sh2; x.fillRect(X0, Y0, 18, P);
    }
  }

  // 7) joints sombres entre panneaux (légèrement plus marqués)
  x.strokeStyle='#04050a'; x.lineWidth=4;
  for(let i=0;i<=N;i++){
    const p = i*P;
    x.beginPath(); x.moveTo(p,0); x.lineTo(p,S); x.stroke();
    x.beginPath(); x.moveTo(0,p); x.lineTo(S,p); x.stroke();
  }

  const t=new THREE.CanvasTexture(cv);
  t.encoding=THREE.sRGBEncoding;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(2, 1.5);                // panneaux d'env. 1,4 × 1,25 m sur la façade
  t.anisotropy=8;
  return t;
}

// écran média animé (contenu dynamique) — réutilisable
function makeScreenMaterial(){
  const m=new THREE.ShaderMaterial({
    uniforms:{ uTime:{value:0} },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
      precision highp float; uniform float uTime; varying vec2 vUv;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5); }
      void main(){
        // bandes colorées défilantes + lueur centrale (façon contenu vidéo)
        float t=uTime;
        vec2 uv=vUv;
        float bands=sin((uv.y*8.0 - t*1.2))*0.5+0.5;
        vec3 col=0.5+0.5*cos(6.2831*(uv.y*0.6 + t*0.15)+vec3(0.0,2.0,4.0));
        col*=0.35+0.5*bands;
        // halo central
        float c=smoothstep(0.5,0.0,length((uv-0.5)*vec2(1.0,1.6)));
        col+=vec3(0.4,0.7,1.0)*c*0.5;
        col*=0.9+0.1*sin(uv.y*200.0);     // scanlines
        gl_FragColor=vec4(col,1.0);
      }`,
    fog:false
  });
  videoScreens.push(m);
  return m;
}

// Référence : enseigne premium ~5,2m × 1,35m × 15cm, alu brossé noir,
// verre fumé léger, contour LED blanc froid, logo + texte rétroéclairés.

function makeRoofSignTexture(){
  // ratio ~ 7.2/1.7 = 4.24 (enseigne façade)
  const W=2560, H=600;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  // verre fumé : fond sombre légèrement bleuté
  ctx.fillStyle='#0a0d12'; ctx.fillRect(0,0,W,H);
  // léger dégradé interne (donne la profondeur du verre)
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'rgba(24,32,48,0.55)');
  gr.addColorStop(0.5,'rgba(8,11,16,0.0)');
  gr.addColorStop(1,'rgba(24,32,48,0.55)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  // rounded-rect helper
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
    ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
    ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
    ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  }
  // halo doux (extérieur du contour LED) — plus large et plus intense
  for(let i=10;i>=1;i--){
    ctx.strokeStyle='rgba(220,232,255,'+(0.06*i)+')';
    ctx.lineWidth=6+i*5;
    rr(34-i*2,34-i*2,W-2*(34-i*2),H-2*(34-i*2),100+i*2);
    ctx.stroke();
  }
  // contour LED principal (blanc froid, plus épais, plus visible)
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=12;
  rr(34,34,W-68,H-68,90);
  ctx.stroke();
  // micro-highlight intérieur
  ctx.strokeStyle='rgba(220,235,255,0.55)'; ctx.lineWidth=3;
  rr(46,46,W-92,H-92,82);
  ctx.stroke();
  // logo "play" (gros, à gauche)
  const lx=460, ly=H/2, lr=220;
  // cercle du logo : double trait pour effet "néon"
  ctx.strokeStyle='rgba(255,255,255,0.40)'; ctx.lineWidth=28;
  ctx.beginPath(); ctx.arc(lx,ly,lr,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=16;
  ctx.beginPath(); ctx.arc(lx,ly,lr,0,Math.PI*2); ctx.stroke();
  // triangle play plein, blanc lumineux
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(lx-lr*0.30, ly-lr*0.55);
  ctx.lineTo(lx-lr*0.30, ly+lr*0.55);
  ctx.lineTo(lx+lr*0.58, ly);
  ctx.closePath(); ctx.fill();
  // halo blanc derrière le logo (rond)
  const lg=ctx.createRadialGradient(lx,ly,lr*0.6, lx,ly,lr*1.6);
  lg.addColorStop(0,'rgba(220,232,255,0.20)');
  lg.addColorStop(1,'rgba(220,232,255,0)');
  ctx.fillStyle=lg;
  ctx.beginPath(); ctx.arc(lx,ly,lr*1.6,0,Math.PI*2); ctx.fill();
  // texte rétroéclairé — TRÈS gros, contrasté, espacement aéré
  // halo doux derrière le texte
  ctx.save();
  ctx.shadowColor='rgba(200,220,255,0.70)';
  ctx.shadowBlur=30;
  ctx.fillStyle='#ffffff';
  ctx.font='600 220px "Helvetica Neue", Arial, sans-serif';
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  const txt='VIDÉOS COURTES';
  let tx=730;
  for(let i=0;i<txt.length;i++){
    ctx.fillText(txt[i], tx, H/2+8);
    tx += ctx.measureText(txt[i]).width + 10;
  }
  ctx.restore();
  // second passage net par-dessus (pour la netteté du contour)
  ctx.fillStyle='#ffffff';
  ctx.font='600 220px "Helvetica Neue", Arial, sans-serif';
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  tx=730;
  for(let i=0;i<txt.length;i++){
    ctx.fillText(txt[i], tx, H/2+8);
    tx += ctx.measureText(txt[i]).width + 10;
  }
  const t=new THREE.CanvasTexture(cv);
  t.encoding=THREE.sRGBEncoding;
  t.anisotropy=16;
  t.minFilter=THREE.LinearMipmapLinearFilter;
  t.magFilter=THREE.LinearFilter;
  t.needsUpdate=true;
  return t;
}

// rectangle arrondi 2D (Shape) — partagé corps/face avant
function roundedRectShape(w, h, r){
  const s=new THREE.Shape();
  s.moveTo(-w/2+r, -h/2);
  s.lineTo( w/2-r, -h/2);
  s.quadraticCurveTo( w/2, -h/2,  w/2, -h/2+r);
  s.lineTo( w/2,  h/2-r);
  s.quadraticCurveTo( w/2,  h/2,  w/2-r,  h/2);
  s.lineTo(-w/2+r,  h/2);
  s.quadraticCurveTo(-w/2,  h/2, -w/2,  h/2-r);
  s.lineTo(-w/2, -h/2+r);
  s.quadraticCurveTo(-w/2, -h/2, -w/2+r, -h/2);
  return s;
}

function buildRoofSign(parentGroup){
  const SW=5.2, SH=1.35, SD=0.15;            // dimensions de la fiche
  const R=0.20;                              // rayon angles
  const roofY=7.5;                           // hauteur du toit (= H du bâtiment)
  const postH=0.32;                          // hauteur des supports
  const signCY=roofY+postH+SH/2;             // centre Y de l'enseigne
  const signCX=-0.6;                         // centré sur le toit, légèrement vers l'avenue

  // ----- supports métalliques intégrés au toit -----
  const postMat=new THREE.MeshStandardMaterial({color:0x14181f, metalness:0.78, roughness:0.36});
  [-1.9, 1.9].forEach(z=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.11, postH, 0.20), postMat);
    p.position.set(signCX, roofY+postH/2, z);
    p.castShadow=true; parentGroup.add(p);
  });
  // platine basse sur le toit (esthétique de fixation)
  [-1.9, 1.9].forEach(z=>{
    const base=new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.04, 0.32), postMat);
    base.position.set(signCX, roofY+0.025, z);
    parentGroup.add(base);
  });

  // ----- corps de l'enseigne : alu brossé noir, rect arrondi 3D -----
  const shape=roundedRectShape(SW, SH, R);
  const bodyGeo=new THREE.ExtrudeGeometry(shape, {
    depth:SD, bevelEnabled:true, bevelThickness:0.018, bevelSize:0.018,
    bevelSegments:3, curveSegments:16
  });
  bodyGeo.translate(0, 0, -SD/2);            // centrer en profondeur autour de Z local = 0
  const bodyMat=new THREE.MeshStandardMaterial({
    color:0x16191f, metalness:0.78, roughness:0.45
  });
  const body=new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow=true; body.receiveShadow=true;

  // ----- face avant : verre fumé + LED + logo + texte -----
  const innerW=SW*0.985, innerH=SH*0.92, innerR=R*0.92;
  const innerShape=roundedRectShape(innerW, innerH, innerR);
  const frontGeo=new THREE.ShapeGeometry(innerShape, 32);
  // UVs normalisées : map XY -> [0,1] sur la bbox de la shape
  const pos=frontGeo.attributes.position;
  const uvs=new Float32Array(pos.count*2);
  for(let i=0;i<pos.count;i++){
    uvs[i*2]   = (pos.getX(i)+innerW/2)/innerW;
    uvs[i*2+1] = (pos.getY(i)+innerH/2)/innerH;
  }
  frontGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  const frontTex=makeRoofSignTexture();
  const frontMat=new THREE.MeshBasicMaterial({
    map:frontTex, transparent:true, fog:false, side:THREE.DoubleSide,
    depthWrite:true
  });
  const front=new THREE.Mesh(frontGeo, frontMat);
  front.position.z = -SD/2 - 0.002;          // juste devant le corps (côté -Z local du sign)

  // groupe enseigne (corps + face avant)
  const signGroup=new THREE.Group();
  signGroup.add(body);
  signGroup.add(front);
  signGroup.position.set(signCX, signCY, 0);
  // Le corps est extrudé selon +Z local de la shape.
  // On veut la face avant tournée vers le local -X du bâtiment (côté avenue).
  // Rotation Y de +π/2 : la largeur (X de la shape) devient Z monde-local,
  // l'épaisseur (Z de l'extrude) devient -X local -> face vers l'avenue.
  signGroup.rotation.y = Math.PI/2;

  parentGroup.add(signGroup);

  // enregistrer le matériau pour la pulsation très subtile
  roofSignMats.push(frontMat);
}

// ===== ENSEIGNE FAÇADE (grande, intégrée à la partie noire haute) =====
// Référence : ~7,2 m × 1,7 m × 12 cm, alu brossé noir, verre fumé, contour LED,
// logo ▶ + "VIDÉOS COURTES", mountée directement au-dessus de la vitrine.
function buildFacadeSign(parentGroup){
  const SW=8.6, SH=2.05, SD=0.13;           // plus grande présence
  const R=0.26;
  const nearX=-2.5;                          // face avenue locale
  const signCX=nearX - SD/2 - 0.025;         // saillie : enseigne en relief sur la façade
  const signCY=5.32;                         // centré entre le bandeau (y≈3,1) et l'arête haute (y=7,5)

  // ----- plaque de fond (recess sombre intégré à la façade derrière l'enseigne) -----
  // plan plat plaqué juste en avant de la façade : donne l'impression d'un encadrement
  const backW=SW+0.55, backH=SH+0.40;
  const backPlate=new THREE.Mesh(
    new THREE.PlaneGeometry(backW, backH),
    new THREE.MeshStandardMaterial({color:0x04060a, metalness:0.6, roughness:0.55})
  );
  backPlate.rotation.y = -Math.PI/2;
  backPlate.position.set(nearX-0.008, signCY, 0);
  parentGroup.add(backPlate);

  // ----- corps enseigne : rect arrondi 3D, alu brossé noir -----
  const shape=roundedRectShape(SW, SH, R);
  const bodyGeo=new THREE.ExtrudeGeometry(shape, {
    depth:SD, bevelEnabled:true, bevelThickness:0.020, bevelSize:0.020,
    bevelSegments:3, curveSegments:18
  });
  bodyGeo.translate(0, 0, -SD/2);
  const bodyMat=new THREE.MeshStandardMaterial({
    color:0x16191f, metalness:0.78, roughness:0.42
  });
  const body=new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow=true; body.receiveShadow=true;

  // ----- face avant : verre fumé + LED + logo + texte -----
  const innerW=SW*0.985, innerH=SH*0.92, innerR=R*0.92;
  const innerShape=roundedRectShape(innerW, innerH, innerR);
  const frontGeo=new THREE.ShapeGeometry(innerShape, 32);
  const pos=frontGeo.attributes.position;
  const uvs=new Float32Array(pos.count*2);
  for(let i=0;i<pos.count;i++){
    // U inversé : depuis la position de l'observateur sur l'avenue, on regarde
    // la face arrière (-Z) du mesh; sans flip horizontal le texte apparaît miroir.
    uvs[i*2]   = 1.0 - (pos.getX(i)+innerW/2)/innerW;
    uvs[i*2+1] = (pos.getY(i)+innerH/2)/innerH;
  }
  frontGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  const frontTex=makeRoofSignTexture();      // même texture premium (LED + logo + texte)
  const frontMat=new THREE.MeshBasicMaterial({
    map:frontTex, transparent:true, fog:false, side:THREE.DoubleSide, depthWrite:true
  });
  const front=new THREE.Mesh(frontGeo, frontMat);
  front.position.z = -SD/2 - 0.020;          // saillie 2 cm pour éviter toute occlusion

  // ----- regrouper et orienter vers l'avenue -----
  const signGroup=new THREE.Group();
  signGroup.add(body);
  signGroup.add(front);
  signGroup.position.set(signCX, signCY, 0);
  signGroup.rotation.y = Math.PI/2;          // face -X local (avenue)
  parentGroup.add(signGroup);

  // halo lumineux discret : 2 plans additifs derrière le contour LED
  const haloMat = c => new THREE.MeshBasicMaterial({
    color:c, transparent:true, opacity:0.10, fog:false,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  const halo1 = new THREE.Mesh(new THREE.PlaneGeometry(SW*1.10, SH*1.30), haloMat(0xe6f0ff));
  halo1.rotation.y = -Math.PI/2;
  halo1.position.set(nearX - 0.005, signCY, 0);
  parentGroup.add(halo1);
  const halo2 = new THREE.Mesh(new THREE.PlaneGeometry(SW*1.30, SH*1.80), haloMat(0xbfd4ff));
  halo2.rotation.y = -Math.PI/2;
  halo2.position.set(nearX - 0.004, signCY, 0);
  halo2.material.opacity = 0.06;
  parentGroup.add(halo2);

  // enregistrer le matériau du front pour la pulsation très subtile
  roofSignMats.push(frontMat);
}

/* ============================================================
   ENSEIGNE RÉELS — lettrage lumineux, contour LED froid/bleuté.
   Brief : "RÉELS" seul (accent sur É), géométrique & épuré, contour LED
   tout autour des lettres, effet puissant mais propre (pas de néon flou),
   métal noir, posée sur pieds métalliques noirs, centrée sur le toit.
   ============================================================ */
function makeReelsSignTexture(){
  const W=1800, H=560;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  c.clearRect(0,0,W,H);                       // fond transparent : seules les lettres s'allument
  const txt='RÉELS';
  c.font='800 300px "Helvetica Neue", Arial, sans-serif';
  c.textBaseline='middle'; c.textAlign='left';
  const LS=26;                                // interlettrage (géométrique, aéré)
  let total=0; for(const ch of txt){ total += c.measureText(ch).width + LS; } total -= LS;
  const x0=(W-total)/2, y=H/2+8;
  function eachLetter(cb){ let xx=x0; for(const ch of txt){ cb(ch,xx); xx += c.measureText(ch).width + LS; } }
  // 1) intérieur sombre des lettres -> lecture "channel letters" 3D
  c.fillStyle='rgba(8,12,20,0.62)';
  eachLetter((ch,xx)=>c.fillText(ch,xx,y));
  // 2) halo bleuté doux mais maîtrisé (lumineux, pas flou)
  c.save();
  c.shadowColor='rgba(150,190,255,0.85)'; c.shadowBlur=26;
  c.lineJoin='round'; c.lineWidth=12; c.strokeStyle='rgba(190,215,255,0.9)';
  eachLetter((ch,xx)=>c.strokeText(ch,xx,y));
  c.restore();
  // 3) contour LED principal net (blanc froid)
  c.lineJoin='round'; c.lineWidth=11; c.strokeStyle='#ffffff';
  eachLetter((ch,xx)=>c.strokeText(ch,xx,y));
  // 4) fin liseré bleu intérieur (signature futuriste)
  c.lineWidth=3; c.strokeStyle='rgba(150,195,255,0.9)';
  eachLetter((ch,xx)=>c.strokeText(ch,xx,y));
  const t=new THREE.CanvasTexture(cv);
  t.encoding=THREE.sRGBEncoding; t.anisotropy=16;
  t.minFilter=THREE.LinearMipmapLinearFilter; t.magFilter=THREE.LinearFilter;
  t.needsUpdate=true;
  return t;
}

function buildReelsRoofSign(parentGroup, opt){
  const SW=4.7, SH=1.32, SD=0.18, R=0.10;     // blade large et fine, angles nets (épuré)
  const roofY=opt.H;                          // sommet du bâtiment
  const postH=0.34;
  const signCY=roofY+postH+SH/2;
  const signCX=0.30;                          // centrée, légèrement en retrait du bord avenue (-X)

  // ----- pieds métalliques noirs + platines -----
  const postMat=new THREE.MeshStandardMaterial({color:0x12161d, metalness:0.80, roughness:0.34});
  [-1.65, 1.65].forEach(z=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.12, postH, 0.20), postMat);
    p.position.set(signCX, roofY+postH/2, z); p.castShadow=true; parentGroup.add(p);
    const base=new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.04, 0.34), postMat);
    base.position.set(signCX, roofY+0.025, z); parentGroup.add(base);
  });

  // ----- blade : métal noir, structure solide (PAS de cadre LED : le contour est sur les lettres) -----
  const bodyGeo=new THREE.ExtrudeGeometry(roundedRectShape(SW, SH, R), {
    depth:SD, bevelEnabled:true, bevelThickness:0.02, bevelSize:0.02,
    bevelSegments:3, curveSegments:12
  });
  bodyGeo.translate(0,0,-SD/2);
  const bodyMat=new THREE.MeshStandardMaterial({color:0x0c0f15, metalness:0.82, roughness:0.40});
  const body=new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow=true; body.receiveShadow=true;

  // ----- face : lettres RÉELS lumineuses (fond transparent) -----
  const innerW=SW*0.985, innerH=SH*0.90, innerR=R*0.90;
  const fg=new THREE.ShapeGeometry(roundedRectShape(innerW, innerH, innerR), 24);
  const pos=fg.attributes.position;
  const uvs=new Float32Array(pos.count*2);
  for(let i=0;i<pos.count;i++){
    uvs[i*2]   = (pos.getX(i)+innerW/2)/innerW;
    uvs[i*2+1] = (pos.getY(i)+innerH/2)/innerH;
  }
  fg.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  const frontMat=new THREE.MeshBasicMaterial({
    map:makeReelsSignTexture(), transparent:true, fog:false,
    side:THREE.DoubleSide, depthWrite:false
  });
  const front=new THREE.Mesh(fg, frontMat);
  front.position.z = -SD/2 - 0.004;

  // halo additif bleuté discret derrière les lettres (très lumineux, propre)
  const halo=new THREE.Mesh(new THREE.PlaneGeometry(SW*0.96, SH*0.80),
    new THREE.MeshBasicMaterial({color:0x9fc4ff, transparent:true, opacity:0.16, fog:false,
      blending:THREE.AdditiveBlending, depthWrite:false}));
  halo.position.z = -SD/2 - 0.002;

  // groupe enseigne (même convention que buildRoofSign : rotation Y +π/2 -> face vers -X = avenue)
  const signGroup=new THREE.Group();
  signGroup.add(body); signGroup.add(halo); signGroup.add(front);
  signGroup.position.set(signCX, signCY, 0);
  signGroup.rotation.y = Math.PI/2;
  parentGroup.add(signGroup);

  // lumière bleue douce : révèle l'enseigne et se reflète sur le sol mouillé
  const L=new THREE.PointLight(opt.accentLight, 0.6, 9, 2);
  L.position.set(signCX-0.6, signCY, 0); parentGroup.add(L);

  roofSignMats.push(frontMat);
}

/* ============================================================

  const eX=new THREE.Mesh(new THREE.BoxGeometry(W_X,0.08,0.08), ledMat(COLD,0.85));

  const eZ=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,D_Z), ledMat(COLD,0.85));
  [hw,-hw].forEach(x=>{ const m=eZ.clone(); m.position.set(x,topY,0); group.add(m); });

  // vitrine bleutée en pied de façade avenue (-X) + meneaux
  const glass=new THREE.Mesh(new THREE.PlaneGeometry(D_Z-0.6, 2.6),

  [-1.6,0,1.6].forEach(z=>{

  ghost.position.set(d.pos[0],H/2,d.pos[1]); reflectionGroup.add(ghost);

  // activation : léger glow bleu sur le métal à l'approche
  d._mat=bodyMat; d._eIdle=0.0; d._eActive=0.22; d._haloR=5.4;
}

function buildVideoBuilding(group, d){
  const COLD=0xe6f0ff, CYAN=0x00e0ff;
  const W_Z=11, H=7.5, D_X=5;          // bas et large (façade le long de Z)
  const nearX=-D_X/2;                  // face avenue (-X local) -> monde 8.5
  const ledMat = (c,op)=>new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:op||1, fog:false});

  // ===== corps : panneaux métal noir =====
  const metalMap = makeMetalTexture();
  const bodyMat = new THREE.MeshStandardMaterial({
    map: metalMap, color:0xffffff, metalness:0.55, roughness:0.55,
    emissive: new THREE.Color(CYAN), emissiveIntensity:0.0
  });
  // --- BoxGeometry + remappage UV planaire (panneaux d'échelle constante sur les 6 faces) ---
  const bodyGeo = new THREE.BoxGeometry(D_X,H,W_Z);
  // chaque "tile" de la texture contient 4×4 panneaux ; on vise des panneaux ~1,4 m
  const TILE = 5.6;     // 4 × 1,4 m
  {
    const posA = bodyGeo.attributes.position;
    const nrmA = bodyGeo.attributes.normal;
    const uvs = new Float32Array(posA.count * 2);
    for (let i=0; i<posA.count; i++){
      const x=posA.getX(i), y=posA.getY(i), z=posA.getZ(i);
      const nx=Math.abs(nrmA.getX(i)), ny=Math.abs(nrmA.getY(i)), nz=Math.abs(nrmA.getZ(i));
      let u, v;
      if (nx > 0.5){          // faces ±X (façade + arrière) : UV = (Z, Y)
        u = z / TILE; v = y / TILE;
      } else if (ny > 0.5){   // faces ±Y (toit + sol) : UV = (X, Z)
        u = x / TILE; v = z / TILE;
      } else {                // faces ±Z (côtés) : UV = (X, Y)
        u = x / TILE; v = y / TILE;
      }
      uvs[i*2]=u; uvs[i*2+1]=v;
    }
    bodyGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  }
  // les UVs encodent déjà l'échelle, on rétablit repeat 1×1 sur la texture cloned
  const metalMapBody = metalMap.clone();
  metalMapBody.wrapS = metalMapBody.wrapT = THREE.RepeatWrapping;
  metalMapBody.repeat.set(1,1);
  metalMapBody.needsUpdate = true;
  bodyMat.map = metalMapBody;
  bodyMat.needsUpdate = true;
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y=H/2; body.castShadow=true; body.receiveShadow=true;
  group.add(body);

  // bandeau anthracite en pied de façade
  const skirt = new THREE.Mesh(new THREE.BoxGeometry(D_X+0.04,0.5,W_Z+0.04),
    new THREE.MeshStandardMaterial({color:0x151a22, metalness:0.6, roughness:0.5}));
  skirt.position.y=0.25; group.add(skirt);

  // ===== contour LED blanc froid (arêtes du bâtiment, nettes) =====
  const hw=D_X/2, hd=W_Z/2;
  // 4 arêtes verticales
  [[hw,hd],[-hw,hd],[hw,-hd],[-hw,-hd]].forEach(c=>{
    const s=new THREE.Mesh(new THREE.BoxGeometry(0.09,H,0.09), ledMat(COLD,0.95));
    s.position.set(c[0],H/2,c[1]); group.add(s);
  });
  // arêtes horizontales hautes (périmètre du toit)
  const topY=H-0.04;
  const eW=new THREE.Mesh(new THREE.BoxGeometry(D_X,0.09,0.09), ledMat(COLD,0.9));
  [hd,-hd].forEach(z=>{ const m=eW.clone(); m.position.set(0,topY,z); group.add(m); });
  const eD=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.09,W_Z), ledMat(COLD,0.9));
  [hw,-hw].forEach(x=>{ const m=eD.clone(); m.position.set(x,topY,0); group.add(m); });

  // ===== FAÇADE AVENUE (-X) — VOLUME ARCHITECTURAL =====
  // Surface de fond (image client : verre + intérieur + béton) placée en retrait,
  // puis ossature métallique 3D devant (cadre, bandeau, meneaux, portique) qui
  // crée la profondeur, les vrais reflets et les ombres → plus une simple affiche.
  const storefrontTex = new THREE.TextureLoader().load(STOREFRONT_VIDEOS_URL,
    function(){ storefrontTex.needsUpdate = true; });
  storefrontTex.encoding = THREE.sRGBEncoding;
  storefrontTex.anisotropy = 16;
  storefrontTex.minFilter = THREE.LinearMipmapLinearFilter;
  storefrontTex.magFilter = THREE.LinearFilter;

  const FW = 10.8, FH = 7.2;
  const yB = 0.15, yT = yB + FH;            // 0,15 .. 7,35
  const ySep = 3.90;                         // séparation béton (haut) / vitrines (bas)

  // -- surface de fond découpée en panneaux (béton + 2 vitrines + porte) --
  // chaque panneau reçoit une sous-région de l'image via UV custom, ce qui permet
  // de RECULER la porte pour créer une vraie niche d'entrée.
  function facadePanel(wZ, hY, uMin, uMax, vMin, vMax, x, yC, zC){
    const geo = new THREE.PlaneGeometry(wZ, hY);
    const uv = geo.attributes.uv;
    for(let i=0;i<uv.count;i++){
      const u=uv.getX(i), v=uv.getY(i);
      uv.setXY(i, uMin+u*(uMax-uMin), vMin+v*(vMax-vMin));
    }
    const m = new THREE.Mesh(geo,
      new THREE.MeshBasicMaterial({map:storefrontTex, fog:false, toneMapped:true}));
    m.rotation.y = -Math.PI/2;
    m.position.set(x, yC, zC);
    group.add(m); return m;
  }
  const vSep = (ySep - yB)/FH;                 // V de la séparation béton/vitrines ≈ 0,52
  const uDoorL = 0.387, uDoorR = 0.607;        // bornes horizontales de la porte (analyse image)
  const xPanel = nearX - 0.14;                 // panneaux vitrine + béton : -2,64
  const xDoor  = nearX - 0.01;                 // porte au fond de la niche : -2,51 (retrait 13 cm)
  // béton (haut, pleine largeur)
  facadePanel(FW, (1-vSep)*FH, 0, 1, vSep, 1, xPanel, yB+(vSep+1)/2*FH, 0);
  // vitrine gauche
  facadePanel(uDoorL*FW, vSep*FH, 0, uDoorL, 0, vSep, xPanel, yB+vSep/2*FH, -FW/2+uDoorL*FW/2);
  // vitrine droite
  facadePanel((1-uDoorR)*FW, vSep*FH, uDoorR, 1, 0, vSep, xPanel, yB+vSep/2*FH, -FW/2+(uDoorR+1)/2*FW);
  // porte (centrale, EN RETRAIT)
  const doorWz=(uDoorR-uDoorL)*FW, doorZc=-FW/2+(uDoorL+uDoorR)/2*FW;
  facadePanel(doorWz, vSep*FH, uDoorL, uDoorR, 0, vSep, xDoor, yB+vSep/2*FH, doorZc);

  // -- joues de la niche d'entrée (donnent la profondeur + ombres naturelles) --
  const nicheMat = new THREE.MeshStandardMaterial({color:0x12151b, metalness:0.35, roughness:0.7});
  const nicheD = xPanel - xDoor;               // profondeur de la niche (≈ 0,13 m, valeur négative)
  const nicheXc = (xPanel+xDoor)/2;
  const nicheH = ySep - yB;
  [-1, 1].forEach(s=>{
    const joue=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(nicheD), nicheH), nicheMat);
    joue.position.set(nicheXc, yB+nicheH/2, doorZc + s*doorWz/2);
    joue.castShadow=true; joue.receiveShadow=true;
    group.add(joue);                            // plan XY, normale ±Z : ferme les côtés
  });
  // plafond de la niche
  const nicheTop=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(nicheD), doorWz), nicheMat);
  nicheTop.rotation.x=Math.PI/2;
  nicheTop.position.set(nicheXc, ySep-0.02, doorZc);
  nicheTop.receiveShadow=true; group.add(nicheTop);

  // -- ossature métallique premium (noir profond, reflets) --
  const frameMat = new THREE.MeshStandardMaterial({
    color:0x0a0d12, metalness:0.86, roughness:0.30,
    emissive:new THREE.Color(0x0a141f), emissiveIntensity:0.16
  });
  const xMul = nearX - 0.20;                 // meneaux/bandeau : -2,70 (devant les vitrines à -2,64)
  const xFrm = nearX - 0.24;                 // cadre périmétrique : -2,74 (le plus saillant)
  function vBar(z, y0, y1, wZ, dX, x){       // meneau vertical
    const m=new THREE.Mesh(new THREE.BoxGeometry(dX, y1-y0, wZ), frameMat);
    m.position.set(x, (y0+y1)/2, z); m.castShadow=true; m.receiveShadow=true;
    group.add(m); return m;
  }
  function hBar(y, z0, z1, hY, dX, x){       // barre horizontale
    const m=new THREE.Mesh(new THREE.BoxGeometry(dX, hY, z1-z0), frameMat);
    m.position.set(x, y, (z0+z1)/2); m.castShadow=true; m.receiveShadow=true;
    group.add(m); return m;
  }

  // cadre périmétrique épais (encadre toute la façade, bien saillant)
  hBar(yT, -FW/2-0.13, FW/2+0.13, 0.28, 0.20, xFrm);   // linteau haut
  hBar(yB, -FW/2-0.13, FW/2+0.13, 0.28, 0.20, xFrm);   // socle bas
  vBar(-FW/2, yB, yT, 0.28, 0.20, xFrm);               // montant gauche
  vBar( FW/2, yB, yT, 0.28, 0.20, xFrm);               // montant droit

  // bandeau horizontal : séparation béton / vitrines (relief marqué)
  hBar(ySep, -FW/2, FW/2, 0.26, 0.18, xMul);

  // meneaux verticaux de la zone vitrée (bords de vitrines + jambages de porte)
  [-4.41, -2.92, -1.22, 1.16, 2.79, 4.35].forEach(z=>{
    vBar(z, yB, ySep, 0.15, 0.14, xMul);
  });

  // linteau de porte (marque le haut de l'entrée à double battant, centrée)
  hBar(3.55, -1.22, 1.16, 0.17, 0.14, xMul);

  // joints verticaux du panneau béton supérieur, alignés avec les meneaux du bas
  // → trame verticale continue sur toute la hauteur (lecture architecturale crédible)
  [-2.92, -1.22, 1.16, 2.79].forEach(z=>{
    vBar(z, ySep+0.14, yT-0.12, 0.07, 0.07, xMul);
  });
  // un joint horizontal discret à mi-hauteur du béton (panneaux en 2 rangées)
  hBar(5.55, -FW/2+0.2, FW/2-0.2, 0.06, 0.06, xMul);

  // fines LED verticales sur les montants extrêmes (rappel des claustras de l'image)
  [-FW/2, FW/2].forEach(z=>{
    const led=new THREE.Mesh(new THREE.PlaneGeometry(0.05, FH-0.5),
      new THREE.MeshBasicMaterial({color:0xeef4ff, transparent:true, opacity:0.9, fog:false}));
    led.rotation.y=-Math.PI/2;
    led.position.set(xFrm-0.105, (yB+yT)/2, z);
    group.add(led);
  });

  // seuil lumineux discret au sol devant la porte (sensation d'entrée réelle)
  const doorSill=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.05,2.38),
    new THREE.MeshBasicMaterial({color:0xdfeaff, transparent:true, opacity:0.7, fog:false}));
  doorSill.position.set(nearX-0.12, yB+0.05, -0.03); group.add(doorSill);

  // ===== REFLETS D'ENVIRONNEMENT sur le métal (envMap procédurale légère) =====
  // petite cube-texture nuit + halos de ville → reflets crédibles sur l'ossature
  (function applyEnvMap(){
    function faceCanvas(top, bottom, halos){
      const s=128, cv=document.createElement('canvas'); cv.width=cv.height=s;
      const x=cv.getContext('2d');
      const g=x.createLinearGradient(0,0,0,s);
      g.addColorStop(0,top); g.addColorStop(1,bottom);
      x.fillStyle=g; x.fillRect(0,0,s,s);
      if(halos){
        for(let i=0;i<6;i++){
          const hx=Math.random()*s, hy=s*0.25+Math.random()*s*0.45, r=4+Math.random()*10;
          const rg=x.createRadialGradient(hx,hy,0,hx,hy,r);
          rg.addColorStop(0,'rgba(180,210,255,0.7)'); rg.addColorStop(1,'rgba(180,210,255,0)');
          x.fillStyle=rg; x.beginPath(); x.arc(hx,hy,r,0,Math.PI*2); x.fill();
        }
      }
      return cv;
    }
    const side = faceCanvas('#2b3c58','#05070b', true);
    const up   = faceCanvas('#37496a','#1b2942', false);
    const down = faceCanvas('#05070b','#020305', false);
    const cube = new THREE.CubeTexture([side,side,up,down,side,side]);
    cube.needsUpdate = true;
    frameMat.envMap = cube; frameMat.envMapIntensity = 0.9; frameMat.needsUpdate = true;
  })();

  // ===== ÉCLAIRAGE LOCAL DE FAÇADE (révèle l'ossature + ambiance) =====
  // PointLights sans ombre (perf) ; solidaires du bâtiment (donc tournent avec lui).
  d._facadeLights = [];
  function facadeLight(color, intensity, dist, x, y, z){
    const L = new THREE.PointLight(color, intensity, dist, 2);
    L.position.set(x, y, z); group.add(L);
    d._facadeLights.push({ light:L, base:intensity });
    return L;
  }
  facadeLight(0xbcd4ff, 0.70, 10, nearX-1.8, 5.6, 0);     // froide : panneau béton (haut)
  facadeLight(0xcfe2ff, 0.60, 11, nearX-2.0, 2.2, 0);     // froide : vitrines (bas, large)
  const warmLight = facadeLight(0xffb070, 1.05, 6.5, nearX+0.2, 1.8, 0);  // chaude : entrée
  d._warmLight = warmLight; d._warmBase = 1.05;

  // ===== HALO CHAUD qui déborde de l'entrée sur le trottoir =====
  // nappe lumineuse au sol devant la porte (le sol-miroir la reflète)
  const pool = new THREE.Mesh(new THREE.CircleGeometry(2.3, 32),
    new THREE.MeshBasicMaterial({color:0xffb368, transparent:true, opacity:0.22, fog:false,
      blending:THREE.AdditiveBlending, depthWrite:false}));
  pool.rotation.x = -Math.PI/2;
  pool.position.set(nearX-1.3, 0.03, doorZc); group.add(pool);
  // glow vertical : lumière qui sort de l'entrée
  const entryGlow = new THREE.Mesh(new THREE.PlaneGeometry(doorWz*1.05, nicheH*0.95),
    new THREE.MeshBasicMaterial({color:0xffb878, transparent:true, opacity:0.10, fog:false,
      blending:THREE.AdditiveBlending, depthWrite:false}));
  entryGlow.rotation.y = -Math.PI/2;
  entryGlow.position.set(nearX-0.28, yB+nicheH/2, doorZc); group.add(entryGlow);


  // ===== FACES LATÉRALES : strips LED verticaux =====
  [-hd-0.01, hd+0.01].forEach(z=>{
    [-1.0,1.0].forEach(o=>{
      const s=new THREE.Mesh(new THREE.PlaneGeometry(0.12,H-1.4), ledMat(COLD,0.85));
      s.position.set(o*1.1, H/2, z); group.add(s);   // sur la face ±Z
    });
  });

  // ===== FACE ARRIÈRE (+X) : strips + porte + enseigne =====
  const bx=hw+0.02;
  [-2.5,0,2.5].forEach(z=>{
    const s=new THREE.Mesh(new THREE.PlaneGeometry(0.12,H-1.2), ledMat(COLD,0.7));
    s.rotation.y=Math.PI/2; s.position.set(bx,H/2,z); group.add(s);
  });
  const backDoor=new THREE.Mesh(new THREE.PlaneGeometry(1.4,2.4),
    new THREE.MeshStandardMaterial({color:0x070a10, metalness:0.6, roughness:0.4,
      emissive:new THREE.Color(COLD), emissiveIntensity:0.06}));
  backDoor.rotation.y=Math.PI/2; backDoor.position.set(bx,1.3,-3.5); group.add(backDoor);

  // (les totems play / "A" au sol ont été retirés : l'image de la devanture
  //  porte déjà l'identité visuelle DIGIT'ARK et Vidéos Courtes.)

  // (bacs végétalisés : à réintroduire quand le parvis sera élargi —
  //  l'espace entre le couloir de marche et la façade est trop étroit ici)

  // ===== SPOTS ENCASTRÉS le long de la façade (à la bordure) =====
  for(let z=-4; z<=4; z+=2){
    const spot=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.04,16), ledMat(COLD,1));
    spot.position.set(nearX-0.3,0.04,z); group.add(spot);
    const gl=new THREE.Mesh(new THREE.CircleGeometry(0.5,20), ledMat(0xcfeeff,0.18));
    gl.material.blending=THREE.AdditiveBlending; gl.material.depthWrite=false;
    gl.rotation.x=-Math.PI/2; gl.position.set(nearX-0.3,0.05,z); group.add(gl);
  }

  // activation : léger glow cyan sur le métal
  d._mat=bodyMat; d._eIdle=0.0; d._eActive=0.25;
  d._haloR=6.0;
}

/* ============================================================
   TOUR DIGIT'ARK — monument iconique de la ville
   ============================================================ */
function buildTowerMonument(group, d){
  // matériau sombre premium (se distingue nettement des blocs placeholder)
  const shaftMat = new THREE.MeshStandardMaterial({
    color:0x0a0c13, metalness:0.8, roughness:0.24,
    emissive:new THREE.Color(0x0c1c2c), emissiveIntensity:0.32});
  d._mat = shaftMat;

  // silhouette télescopique élancée
  const sections = [
    {w:9, dp:9, y0:0,  h:15},
    {w:7, dp:7, y0:15, h:12},
    {w:5, dp:5, y0:27, h:9}
  ];
  sections.forEach(s=>{
    const m = new THREE.Mesh(new THREE.BoxGeometry(s.w, s.h, s.dp), shaftMat);
    m.position.y = s.y0 + s.h/2;
    m.castShadow = true; m.receiveShadow = true;
    group.add(m);
    // arêtes lumineuses (visibles de loin)
    const e = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(s.w, s.h, s.dp)),
      new THREE.LineBasicMaterial({color:0x9fe4ff, transparent:true, opacity:0.85, fog:false}));
    e.position.y = s.y0 + s.h/2;
    group.add(e);
    // strips verticaux lumineux aux arêtes
    const hw=s.w/2, hd=s.dp/2;
    [[hw,hd],[-hw,hd],[hw,-hd],[-hw,-hd]].forEach(c=>{
      const strip = new THREE.Mesh(
        new THREE.BoxGeometry(0.16, s.h, 0.16),
        new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:0.65, fog:false}));
      strip.position.set(c[0], s.y0+s.h/2, c[1]);
      group.add(strip); towerStrips.push(strip);
    });
  });
  const top = 36;

  // signature : ligne lumineuse centrale verticale sur la façade (face au joueur, -Z)
  towerCore = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 30, 0.18),
    new THREE.MeshBasicMaterial({color:0xeaf7ff, transparent:true, opacity:0.9, fog:false}));
  towerCore.position.set(0, 16, -4.55);
  group.add(towerCore);

  // couronne / enseigne au sommet
  const crown = new THREE.Mesh(
    new THREE.BoxGeometry(4.2,0.7,4.2),
    new THREE.MeshBasicMaterial({color:0xeaf7ff, transparent:true, opacity:0.95, fog:false}));
  crown.position.y = top+0.4; group.add(crown);

  // flèche / antenne + balises rouges clignotantes
  const spire = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.34,7,10),
    new THREE.MeshStandardMaterial({color:0x14181f, metalness:0.8, roughness:0.3,
      emissive:0x16344a, emissiveIntensity:0.5}));
  spire.position.y = top+3.5; group.add(spire);
  const redMat = new THREE.MeshBasicMaterial({color:0xff5a5a, fog:false, transparent:true});
  d._redBeacons = [];
  [top+5.6, top+7.2].forEach(yy=>{
    const r = new THREE.Mesh(new THREE.SphereGeometry(0.16,10,10), redMat.clone());
    r.position.y = yy; group.add(r); d._redBeacons.push(r);
  });

  // faisceau vertical lumineux (au-dessus de l'antenne)
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,90,12),
    new THREE.MeshBasicMaterial({color:0xdff4ff, transparent:true, opacity:0.55, fog:false}));
  beam.position.y = top+52; group.add(beam); d._beam = beam;

  // orbe-balise + halo (repère permanent à longue distance)
  const orb = new THREE.Mesh(new THREE.SphereGeometry(1.0,20,20),
    new THREE.MeshBasicMaterial({color:0xeaf7ff, transparent:true, opacity:0.95, fog:false}));
  orb.position.y = top+4; group.add(orb); d._orb = orb;
  const glow = new THREE.Mesh(new THREE.SphereGeometry(2.2,20,20),
    new THREE.MeshBasicMaterial({color:0x9fe4ff, transparent:true, opacity:0.18, fog:false}));
  glow.position.y = top+4; group.add(glow); d._glow = glow;

  // socle lumineux au sol (anneau)
  const baseRing = new THREE.Mesh(
    new THREE.TorusGeometry(5.8,0.13,12,72),
    new THREE.MeshBasicMaterial({color:0x9fe4ff, transparent:true, opacity:0.6, fog:false}));
  baseRing.rotation.x = Math.PI/2; baseRing.position.y = 0.16;
  group.add(baseRing);

  // projecteurs
  const beacon = new THREE.PointLight(0xbfeaff, 2.6, 170, 2);
  beacon.position.y = top+6; group.add(beacon);
  const baseLight = new THREE.PointLight(0x6fb6e8, 1.3, 34, 2);
  baseLight.position.y = 3.5; group.add(baseLight);

  d._haloR = 6.4;

  // reflet (silhouette simplifiée)
  const ghostMat = shaftMat.clone(); ghostMat.transparent=true; ghostMat.opacity=0.34;
  const ghost = new THREE.Mesh(new THREE.BoxGeometry(9,30,9), ghostMat);
  ghost.position.set(d.pos[0], 15, d.pos[1]);
  reflectionGroup.add(ghost);
}

   DÉCOR — peu d'éléments, mais qualitatifs (l'espace vide fait partie de l'identité)

function buildDecor(){
  // arbres futuristes minimalistes, le long de l'avenue
  [8,30,52].forEach(z=>{ makeTree(-10,z); makeTree(10,z); });
  // bornes lumineuses (rythme discret)
  [-3,19,41].forEach(z=>{ makeBollard(-8.2,z); makeBollard(8.2,z); });

  buildSculpture(0,64);
  // quelques drones décoratifs
  makeDrone(-4,10,18);
  makeDrone(5,12.5,38);
  makeDrone(-2,9.5,52);
}

function makeTree(x,z){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.16,3.4,8),
    new THREE.MeshStandardMaterial({color:0x0a0d11, metalness:0.55, roughness:0.5}));
  trunk.position.y=1.7; trunk.castShadow=true; g.add(trunk);
  const canopyMat = new THREE.MeshStandardMaterial({color:0x0c1a18, metalness:0.3, roughness:0.7,
    emissive:0x123a33, emissiveIntensity:0.45, flatShading:true});
  const c1 = new THREE.Mesh(new THREE.IcosahedronGeometry(1.25,0), canopyMat);
  c1.position.y=3.8; c1.rotation.y=Math.random()*3; c1.castShadow=true; g.add(c1);
  const c2 = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8,0), canopyMat);
  c2.position.set(0.3,4.7,0.2); c2.castShadow=true; g.add(c2);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5,0.03,8,28),
    new THREE.MeshBasicMaterial({color:0x7fdfff, transparent:true, opacity:0.5, fog:false}));
  ring.rotation.x=Math.PI/2; ring.position.y=0.06; g.add(ring);
  g.position.set(x,0,z); scene.add(g);
}

function buildSculpture(x,z){

  const base=new THREE.Mesh(new THREE.CylinderGeometry(2.0,2.3,0.45,48),
    new THREE.MeshStandardMaterial({color:0x06080d, metalness:0.92, roughness:0.18}));
  base.position.y=0.22; base.receiveShadow=true; g.add(base);
  const rim=new THREE.Mesh(new THREE.TorusGeometry(2.0,0.05,12,64),

}

function makeDrone(x,y,z){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.18,0.7),
    new THREE.MeshStandardMaterial({color:0x0a0c11, metalness:0.7, roughness:0.3,
      emissive:0x0a1a22, emissiveIntensity:0.4}));

  [[0.42,0.42],[-0.42,0.42],[0.42,-0.42],[-0.42,-0.42]].forEach(p=>{
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.17,0.03,8,18),
      new THREE.MeshBasicMaterial({color:0x7fdfff, transparent:true, opacity:0.8, fog:false}));
    ring.rotation.x=Math.PI/2; ring.position.set(p[0],0.06,p[1]); g.add(ring);
  });
  const light=new THREE.PointLight(0x9fe4ff,0.6,10,2); light.position.y=-0.3; g.add(light);
  const red=new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8),
