  red.position.y=-0.12; g.add(red);
  g.position.set(x,y,z);
  g.userData={baseY:y, baseX:x, phase:Math.random()*6.28, sx:5+Math.random()*5};
  scene.add(g); drones.push(g);
}

let playerMat, playerCore;
function buildPlayer(){
  player = new THREE.Group();
  const female = (window.__avatar === 'femme');

  const bodyMat = new THREE.MeshStandardMaterial({color:0x0a0a0d, metalness:0.4, roughness:0.5,
    emissive:0x09141a, emissiveIntensity:0.6});
  playerMat = bodyMat;

  // torso
  const torsoGeo = female
    ? new THREE.CylinderGeometry(0.42,0.30,1.5,16)
    : new THREE.CylinderGeometry(0.46,0.42,1.6,16);
  const torso = new THREE.Mesh(torsoGeo, bodyMat);
  torso.position.y = female?1.5:1.55;
  torso.castShadow = true; player.add(torso);

  // legs
  const legGeo = new THREE.CylinderGeometry(0.2,0.16,1.5,12);
  [-0.2,0.2].forEach(dx=>{
    const leg = new THREE.Mesh(legGeo, bodyMat);
    leg.position.set(dx,0.75,0); leg.castShadow=true; player.add(leg);
  });

  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34,20,20), bodyMat);
  head.position.y = female?2.55:2.65; head.castShadow=true; player.add(head);

  // glowing core ring
  const ringGeo = new THREE.TorusGeometry(0.5,0.045,10,32);
  const ringMat = new THREE.MeshBasicMaterial({color:0x7fdfff});
  playerCore = new THREE.Mesh(ringGeo, ringMat);
  playerCore.rotation.x = Math.PI/2; playerCore.position.y = 0.1;
  player.add(playerCore);

  // pin light under player
  const pin = new THREE.PointLight(0x9fe4ff, 0.8, 14, 2);
  pin.position.y = 2; player.add(pin);

  player.position.set(0,0,-6);
  scene.add(player);

  // player reflection ghost
  const gMat = bodyMat.clone(); gMat.transparent=true; gMat.opacity=0.2;
  player.userData.reflection = null;
}

function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  const pr = renderer.getPixelRatio();
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  if(composer){
    composer.setSize(w * pr, h * pr);
    if(bloomPass) bloomPass.setSize(Math.round(w*pr*0.5), Math.round(h*pr*0.5));
    if(fxaaPass){
      fxaaPass.material.uniforms['resolution'].value.set(1/(w*pr), 1/(h*pr));
    }
  }
}

/* ---- main loop ---- */
const camOffset = new THREE.Vector3(0,13,-19);   // behind (-Z) and above
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if(started && !panelOpen){
    // natural, screen-relative input: up = forward (+Z), right = +X. No rotation.
    let mx=0, mz=0;
    if(keys['arrowup']||keys['z']||keys['w'])   mz+=1;
    if(keys['arrowdown']||keys['s'])            mz-=1;
    if(keys['arrowleft']||keys['q']||keys['a']) mx-=1;
    if(keys['arrowright']||keys['d'])           mx+=1;
    mx += moveVec.x; mz += -moveVec.y;   // joystick: pushing up gives -y -> forward
    mx = -mx;   // camera looks down +Z, so world +X is screen-left -> invert for natural right = right

    if(mx||mz){
      const len = Math.hypot(mx,mz)||1;
      player.position.x += (mx/len)*PLAYER_SPEED*dt;
      player.position.z += (mz/len)*PLAYER_SPEED*dt;
      player.rotation.y = Math.atan2(mx,mz);    // face travel direction (cosmetic)

      // guided corridor — the visitor can never get lost or wander off
      player.position.x = Math.max(-AVENUE_HALF, Math.min(AVENUE_HALF, player.position.x));
      player.position.z = Math.max(Z_MIN, Math.min(Z_MAX, player.position.z));
    }
    checkProximity();
  }

  // third-person follow — fixed orientation, always looking forward down the avenue
  camera.position.lerp(
    new THREE.Vector3(player.position.x+camOffset.x, camOffset.y, player.position.z+camOffset.z), 0.1);
  camera.lookAt(player.position.x, 2.2, player.position.z+7);

  // ambient life
  playerCore.scale.setScalar(1+Math.sin(t*3)*0.06);
  buildings.forEach(b=>{
    if(b._beam){ b._beam.material.opacity = 0.5+Math.sin(t*1.6)*0.22; }
    if(b._orb){
      b._orb.material.opacity = 0.78+Math.sin(t*2.2)*0.2;
      b._orb.scale.setScalar(1+Math.sin(t*2.2)*0.1);
    }
    if(b._glow){
      b._glow.material.opacity = 0.14+Math.sin(t*2.2)*0.08;
      b._glow.scale.setScalar(1+Math.sin(t*2.2)*0.12);
    }
    if(b._redBeacons){
      const on = (Math.sin(t*3.0)>0)?1:0.12;
      b._redBeacons.forEach(rb=> rb.material.opacity = on);
    }
    if(b._halo){
      const target = (activeDistrict===b)?0.55:0.0;
      b._halo.material.opacity += (target-b._halo.material.opacity)*0.15;
      b._halo.rotation.z += 0.004;
    }
    const eIdle   = (b._eIdle   !== undefined) ? b._eIdle   : (b.tower?0.32:0.05);
    const eActive = (b._eActive !== undefined) ? b._eActive : (b.tower?0.6:0.28);
    const targetE = (activeDistrict===b) ? eActive : eIdle;
    b._mat.emissiveIntensity += (targetE-b._mat.emissiveIntensity)*0.12;
    // éclairage de façade : montée douce à l'approche, vie subtile sur la chaude
    if(b._facadeLights){
      const af = (activeDistrict===b) ? 1.0 : 0.6;
      for(let k=0;k<b._facadeLights.length;k++){
        const fl=b._facadeLights[k];
        let target = fl.base*af;
        if(fl.light===b._warmLight) target *= (1 + Math.sin(t*1.7)*0.045);
        fl.light.intensity += (target - fl.light.intensity)*0.08;
      }
    }
  });

  // ---- décor vivant ----
  if(skyMesh) skyMesh.position.copy(camera.position);
  if(skyMat) skyMat.uniforms.uTime.value = t;
  skyBeams.forEach(b=>{
    b.rotation.z = b.userData.baseRot + Math.sin(t*0.15 + b.userData.phase)*b.userData.amp;
  });
  drones.forEach(dr=>{
    const u = dr.userData;
    dr.position.y = u.baseY + Math.sin(t*1.1+u.phase)*0.5;
    dr.position.x = u.baseX + Math.sin(t*0.35+u.phase)*u.sx;
    dr.rotation.y += 0.012;
  });
  sculptureRings.forEach((r,i)=>{ r.rotation.z += 0.004*(i+1)*((i%2)?-1:1); });
  if(sculptureCore) sculptureCore.scale.setScalar(1+Math.sin(t*2.5)*0.12);
  towerStrips.forEach((s,i)=>{ s.material.opacity = 0.6+Math.sin(t*1.4+i*0.4)*0.18; });
  if(towerCore) towerCore.material.opacity = 0.85+Math.sin(t*1.8)*0.12;
  for(let i=0;i<videoScreens.length;i++){ videoScreens[i].uniforms.uTime.value = t; }
  // enseigne : LEDs constantes (pas de pulsation - reste pleinement allumée)

  if(composer) composer.render();
  else renderer.render(scene, camera);
}

/* ---- proximity & prompt ---- */
const promptEl = document.getElementById('prompt');
function checkProximity(){
  let nearest=null, nd=Infinity;
  buildings.forEach(b=>{
    const d=Math.hypot(player.position.x-b.pos[0], player.position.z-b.pos[1]);
    if(d<b._radius && d<nd){ nd=d; nearest=b; }
  });
  if(nearest!==activeDistrict){
    activeDistrict = nearest;
    if(nearest){
      promptEl.querySelector('.pname').textContent = nearest.title;
      promptEl.classList.add('show');
    } else {
      promptEl.classList.remove('show');
    }
  }
}

/* ============================================================
   PANEL
   ============================================================ */
const panel = document.getElementById('panel');
const pbody = document.getElementById('pbody');

function openPanel(d){
  if(!d) return;
  panelOpen = true;
  let html = `<div class="pkicker">${d.label}</div>
    <h1 class="ptitle">${d.title}</h1>
    <p class="psub">${d.sub}</p>`;

  if(d.body) html += d.body;

  if(d.offers){
    d.offers.forEach(o=>{
      html += `<div class="price-row">
        <div><div class="pr-name">${o.n}</div>
          <div class="pr-desc">${o.d}</div>
          ${o.tag?`<span class="pr-tag">${o.tag}</span>`:""}
        </div>
        <div class="pr-price">${o.was?`<s>${o.was}</s>`:""}${o.from?`<span style="font-size:11px;color:#8c8c92;font-family:Sora;font-weight:300">dès </span>`:""}${o.p}${o.per?`<span style="font-size:13px;color:#8c8c92;font-family:Sora;font-weight:300">${o.per}</span>`:""}</div>
      </div>`;
    });
  }

  if(d.bullets){
    html += `<div class="bullets">`+d.bullets.map(b=>`<div>${b}</div>`).join('')+`</div>`;
  }

  // gallery placeholders
  html += `<div class="gcap">${d.galCap||'Portfolio'}</div>
    <div class="gallery">${'<div class="gtile"></div>'.repeat(6)}</div>`;

  if(d.quote){
    const [q,who] = d.quote.split('—');
    html += `<div class="quote">“${q.trim()}”${who?`<span>${who.trim()}</span>`:""}</div>`;
  }

  html += `<div class="actions">
      <a class="btn btn-wa" target="_blank" rel="noopener"
         href="${WA+encodeURIComponent(d.title)}">Discuter sur WhatsApp →</a>
      <a class="btn btn-rdv" href="${MAIL}?subject=${encodeURIComponent('Rendez-vous · '+d.title)}">Prendre rendez-vous</a>
    </div>`;

  pbody.innerHTML = html;
  pbody.scrollTop = 0;
  panel.classList.add('open');
}
function closePanel(){
  panelOpen = false;
  panel.classList.remove('open');
}
panel.querySelector('.pclose').addEventListener('click', closePanel);
promptEl.querySelector('.enter').addEventListener('click', ()=>openPanel(activeDistrict));

/* ============================================================
   INPUT
   ============================================================ */
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k]=true;
  if(k==='e' && started && !panelOpen) openPanel(activeDistrict);
  if(k==='escape') closePanel();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

/* joystick */
const stick = document.getElementById('stick');
const thumb = stick.querySelector('.thumb');
let stickActive=false, stickId=null;
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
if(isTouch){ stick.style.display='block'; }

function stickStart(x,y,id){ stickActive=true; stickId=id; }
function stickMove(x,y){
  if(!stickActive) return;
  const r = stick.getBoundingClientRect();
  let dx = x-(r.left+r.width/2), dy = y-(r.top+r.height/2);
  const max = r.width/2;
  const len = Math.hypot(dx,dy);
  if(len>max){ dx*=max/len; dy*=max/len; }
  thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  moveVec.set(dx/max, dy/max);
}
function stickEnd(){ stickActive=false; stickId=null; moveVec.set(0,0);
  thumb.style.transform='translate(-50%,-50%)'; }

stick.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];stickStart(t.clientX,t.clientY,t.identifier);stickMove(t.clientX,t.clientY);});
window.addEventListener('touchmove',e=>{for(const t of e.changedTouches){if(t.identifier===stickId)stickMove(t.clientX,t.clientY);}},{passive:false});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===stickId)stickEnd();}});
window.addEventListener('touchcancel',stickEnd);

/* ============================================================
   FLOW: intro -> avatar -> city
   ============================================================ */
const introEl = document.getElementById('intro');
const avatarEl = document.getElementById('avatar');
const hudEl = document.getElementById('hud');
const toastEl = document.getElementById('toast');

document.getElementById('discover').addEventListener('click', ()=>{
  introEl.classList.add('hide');
  setTimeout(()=>avatarEl.classList.remove('hide'), 300);
});

document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('click', ()=>{
    window.__avatar = card.dataset.av;
    avatarEl.classList.add('hide');
    setTimeout(()=>{
      initScene();
      hudEl.classList.add('on');
      started = true;
      toastEl.classList.add('show');
      setTimeout(()=>toastEl.classList.remove('show'), 3400);
    }, 700);
  });
});
</script>
