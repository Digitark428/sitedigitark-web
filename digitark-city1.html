<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>DIGIT'ΛRK — City Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;
    --white:#fff;
    --mute:#8c8c92;
    --line:rgba(255,255,255,.14);
    --cyan:#7fdfff;
    --glass:rgba(10,10,12,.72);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);overflow:hidden;color:var(--white);
    font-family:'Sora',-apple-system,sans-serif;}
  canvas{display:block;}
  #app{position:fixed;inset:0;}

  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes sweep{0%{left:-60%;}100%{left:130%;}}

  /* ---------- shared overlay ---------- */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#000;z-index:30;text-align:center;padding:24px;
    transition:opacity .9s ease;}
  .screen.hide{opacity:0;pointer-events:none;}

  /* wordmark */
  .wordmark{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.02em;
    background:linear-gradient(180deg,#fff 0%,#fff 45%,#9a9aa0 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;position:relative;}
  .wordmark .dot{color:#fff;-webkit-text-fill-color:#fff;}

  /* ---------- intro ---------- */
  #intro .wordmark{font-size:clamp(44px,11vw,108px);opacity:0;animation:rise 1.2s .25s forwards;}
  #intro .sweep{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  #intro .sweep::after{content:"";position:absolute;top:-40%;left:-60%;width:40%;height:180%;
    transform:rotate(18deg);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
    animation:sweep 3.4s 1.1s ease-in-out infinite;}
  #intro .tag{margin-top:26px;font-weight:300;font-size:clamp(15px,4.4vw,21px);
    line-height:1.5;color:#cfcfd4;max-width:440px;opacity:0;animation:rise 1.1s .8s forwards;}
  .cta{margin-top:42px;padding:15px 40px;border:1px solid rgba(255,255,255,.55);
    border-radius:60px;background:transparent;color:#fff;font-family:'Sora';font-size:16px;
    font-weight:400;letter-spacing:.02em;cursor:pointer;opacity:0;animation:rise 1.1s 1.3s forwards;
    transition:background .35s,border-color .35s,letter-spacing .35s;}
  .cta:hover{background:#fff;color:#000;letter-spacing:.06em;}

  /* ---------- avatar select ---------- */
  #avatar{gap:8px;}
  #avatar .label{font-weight:300;letter-spacing:.32em;text-transform:uppercase;
    font-size:13px;color:var(--mute);}
  #avatar h2{font-family:'Syne';font-weight:700;font-size:clamp(26px,7vw,44px);margin-bottom:34px;}
  .cards{display:flex;gap:clamp(14px,4vw,34px);flex-wrap:wrap;justify-content:center;}
  .card{width:clamp(140px,40vw,210px);aspect-ratio:3/4.4;border:1px solid var(--line);
    border-radius:18px;background:linear-gradient(180deg,#0d0d10,#050506);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:18px;cursor:pointer;position:relative;overflow:hidden;
    transition:transform .4s cubic-bezier(.2,.8,.2,1),border-color .4s,box-shadow .4s;}
  .card:hover{transform:translateY(-8px);border-color:rgba(127,223,255,.6);
    box-shadow:0 24px 60px -20px rgba(127,223,255,.35);}
  .card svg{position:absolute;top:8%;left:50%;transform:translateX(-50%);height:64%;}
  .card .nm{font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-size:13px;z-index:2;}
  .card .pick{font-size:11px;color:var(--mute);margin-top:4px;z-index:2;letter-spacing:.04em;}
  .card::before{content:"";position:absolute;bottom:0;left:0;right:0;height:55%;
    background:radial-gradient(70% 90% at 50% 120%,rgba(127,223,255,.16),transparent);
    opacity:0;transition:opacity .4s;}
  .card:hover::before{opacity:1;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity 1s;}
  #hud.on{opacity:1;}
  .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:18px 22px;}
  .topbar .wordmark{font-size:22px;}
  .hint{font-size:11px;color:var(--mute);letter-spacing:.16em;text-transform:uppercase;
    text-align:right;line-height:1.7;}
  .toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Syne';font-weight:700;font-size:clamp(20px,6vw,34px);letter-spacing:.04em;
    opacity:0;transition:opacity .6s,transform .6s;text-shadow:0 0 30px rgba(0,0,0,.8);}
  .toast.show{opacity:1;}
  .toast small{display:block;font-family:'Sora';font-weight:300;font-size:13px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--cyan);margin-top:10px;}

  /* proximity prompt */
  #prompt{position:absolute;left:50%;bottom:130px;transform:translateX(-50%) translateY(14px);
    pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:0;transition:opacity .3s,transform .3s;}
  #prompt.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #prompt .pname{font-family:'Syne';font-weight:700;font-size:18px;letter-spacing:.02em;}
  #prompt .enter{padding:12px 28px;border:1px solid rgba(255,255,255,.55);border-radius:50px;
    background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:#fff;font-family:'Sora';
    font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;
    transition:background .3s,color .3s;}
  #prompt .enter:hover{background:#fff;color:#000;}
  #prompt .key{display:inline-flex;align-items:center;justify-content:center;min-width:22px;
    height:22px;padding:0 6px;border:1px solid currentColor;border-radius:6px;font-size:11px;}

  /* joystick (mobile) */
  #stick{position:absolute;left:26px;bottom:34px;width:118px;height:118px;border-radius:50%;
    border:1px solid var(--line);background:rgba(255,255,255,.03);display:none;pointer-events:auto;
    touch-action:none;}
  #stick .thumb{position:absolute;left:50%;top:50%;width:46px;height:46px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(255,255,255,.85);
    box-shadow:0 0 24px rgba(127,223,255,.5);}

  /* ---------- service panel ---------- */
  #panel{position:fixed;z-index:25;background:var(--glass);backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);border:1px solid var(--line);
    display:flex;flex-direction:column;color:#fff;transition:transform .55s cubic-bezier(.2,.8,.2,1);}
  /* desktop: right drawer */
  #panel{top:0;right:0;height:100%;width:min(440px,92vw);transform:translateX(105%);
    border-left:1px solid var(--line);}
  #panel.open{transform:translateX(0);}
  .pclose{position:absolute;top:16px;right:18px;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--line);background:transparent;color:#fff;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .3s;z-index:3;}
  .pclose:hover{background:rgba(255,255,255,.1);}
  .pscroll{overflow-y:auto;padding:54px 30px 30px;height:100%;}
  .pkicker{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--cyan);}
  .ptitle{font-family:'Syne';font-weight:800;font-size:clamp(28px,6vw,40px);
    line-height:1.02;margin:10px 0 6px;}
  .psub{font-weight:300;color:#cfcfd4;font-size:15px;margin-bottom:24px;font-style:italic;}
  .price-row{display:flex;justify-content:space-between;align-items:baseline;gap:14px;
    padding:18px 0;border-top:1px solid var(--line);}
  .price-row:last-of-type{border-bottom:1px solid var(--line);}
  .pr-name{font-weight:600;font-size:16px;letter-spacing:.01em;}
  .pr-desc{font-weight:300;font-size:13px;color:var(--mute);margin-top:3px;line-height:1.45;}
  .pr-tag{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--cyan);border:1px solid rgba(127,223,255,.4);
    border-radius:30px;padding:3px 9px;}
  .pr-price{font-family:'Syne';font-weight:700;font-size:clamp(22px,6vw,30px);white-space:nowrap;}
  .pr-price s{font-family:'Sora';font-weight:300;font-size:14px;color:var(--mute);display:block;
    text-align:right;}
  .bullets{margin:22px 0 4px;display:flex;flex-direction:column;gap:11px;}
  .bullets div{font-weight:300;font-size:14px;color:#d7d7db;display:flex;gap:11px;line-height:1.4;}
  .bullets div::before{content:"";flex:0 0 6px;height:6px;margin-top:7px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:24px 0 8px;}
  .gtile{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);
    background:linear-gradient(135deg,#161620,#08080c);position:relative;overflow:hidden;}
  .gtile::after{content:"";position:absolute;inset:0;
    background:radial-gradient(60% 60% at 30% 20%,rgba(127,223,255,.18),transparent);}
  .gcap{font-size:11px;color:var(--mute);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
  .quote{margin:24px 0;padding:18px;border-left:2px solid var(--cyan);
    background:rgba(255,255,255,.03);border-radius:0 10px 10px 0;font-weight:300;
    font-size:14px;line-height:1.55;color:#e3e3e6;}
  .quote span{display:block;margin-top:8px;font-size:12px;color:var(--mute);letter-spacing:.06em;}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:26px;}
  .btn{padding:15px;border-radius:50px;text-align:center;font-size:15px;cursor:pointer;
    text-decoration:none;display:block;transition:transform .25s,filter .25s,background .25s,color .25s;}
  .btn:active{transform:scale(.98);}
  .btn-wa{background:linear-gradient(135deg,#fff,#d6d6da);color:#000;font-weight:600;}
  .btn-wa:hover{filter:brightness(1.05);}
  .btn-rdv{border:1px solid rgba(255,255,255,.5);color:#fff;font-weight:400;}
  .btn-rdv:hover{background:#fff;color:#000;}

  /* mobile layout */
  @media (max-width:640px){
    #panel{top:auto;bottom:0;right:0;left:0;width:100%;height:86%;border-left:none;
      border-top:1px solid var(--line);border-radius:22px 22px 0 0;transform:translateY(105%);}
    #panel.open{transform:translateY(0);}
    .topbar .hint{display:none;}
  }
  .nojs{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<!-- INTRO -->
<section id="intro" class="screen">

      </svg>
      <div class="nm">Femme</div>
      <div class="pick">Sélectionner</div>

</section>

<!-- HUD -->
<div id="hud">
  <div class="topbar">
    <div class="wordmark">DIGIT'ΛRK<span class="dot">.</span></div>
    <div class="hint">Avancez · Z Q S D / Flèches / joystick<br>Entrer un bâtiment · E</div>
  </div>
  <div class="toast" id="toast">Bienvenue dans DIGIT'ΛRK CITY<small>Avancez tout droit dans l'avenue</small></div>
  <div id="prompt">
    <div class="pname"></div>
    <button class="enter">Entrer <span class="key">E</span></button>

  <div id="stick"><div class="thumb"></div></div>
</div>

<!-- SERVICE PANEL -->
<aside id="panel">
  <button class="pclose" aria-label="Fermer">✕</button>
  <div class="pscroll" id="pbody"></div>
</aside>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   DIGIT'ARK CITY — prototype
   ============================================================ */

const WA = "https://wa.me/33693813858?text=" +
  encodeURIComponent("Bonjour DIGIT'ARK, je viens du site et je suis intéressé(e) par ");
const MAIL = "mailto:digitarkcontact@gmail.com";

/* ---- districts / buildings data ---- */
const DISTRICTS = [
  {
    id:"hub", label:"À propos", title:"DIGIT'ΛRK", sub:"Le système, pas le hasard.",
    pos:[-11,2], size:[5.5,10,5], accent:0xffffff, hub:true,

    ],
    bullets:["Contenu pensé pour performer","Présence régulière et cohérente","Sans engagement"],
    quote:"Enfin une présence cohérente, sans y penser. — Client DIGIT'ARK", galCap:"Réalisations"
  },
  {
    id:"film", label:"District Cinéma", title:"Film Signature",
    sub:"Raconter. Captiver. Vendre.", pos:[11,24], size:[6,6,6], accent:0xffffff,
    offers:[{n:"Film Signature", d:"Une journée dédiée à votre tournage", p:"1190€"}],
    bullets:["Tournage professionnel sur place","Direction créative & storytelling",
             "Montage haut de gamme","Vidéo publicitaire prête à performer"],
    quote:"Un film qui nous ressemble vraiment. — Client DIGIT'ARK", galCap:"Nos réalisations"
  },
  {
    id:"photo", label:"District Photo", title:"Shoot Signature",
    sub:"Raconter. Captiver. Vendre.", pos:[-11,35], size:[5,5.5,5], accent:0xffffff,
    offers:[{n:"Shoot Signature", d:"Une journée dédiée à votre shooting", p:"990€"}],
    bullets:["Shooting photo professionnel","Direction créative & storytelling",
             "Optimisé pour votre image de marque","Retouche haut de gamme"],

  },
  {
    id:"web", label:"District Web", title:"Site Web One Page",
    sub:"Rapide, optimisé, conçu pour convertir.", pos:[11,46], size:[5,7.5,5], accent:0x7fdfff,
    offers:[{n:"Site One Page", d:"Sur mesure · structure orientée conversion", p:"690€", from:true}],

             "Idéal pour lancer rapidement votre présence"],

  {

    offers:[{n:"Le système complet", d:"Shoot Intensif · Croissance 3 mois · Film & Shoot Signature · Site Web · Présentation", p:"5200€", was:"6220€"}],

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
let renderer, scene, camera, player, clock;
let buildings = [];
let activeDistrict = null;
let started = false, panelOpen = false;
const keys = {};
const moveVec = new THREE.Vector2(0,0);   // from joystick
const PLAYER_SPEED = 18;  // plus dynamique (clavier + joystick)
const AVENUE_HALF = 8;   // walkable corridor half-width (never get lost)
const Z_MIN = -11;       // entrée de la ville (un peu de recul derrière le joueur)
const Z_MAX = 60;        // s'arrête devant le parvis de la Tour

// décor animé (ambiance)
let drones = [], skyBeams = [], sculptureRings = [], towerStrips = [];
let towerCore = null, sculptureCore = null, skyMat = null, skyMesh = null;

function initScene(){
  const app = document.getElementById('app');
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  // rendu cinématique haut de gamme (pas un look arcade)
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.08;
  app.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x04060c);
  // brume atmosphérique légèrement bleutée -> profondeur, sobre et nocturne
  scene.fog = new THREE.FogExp2(0x070b16, 0.0115);

  // third-person perspective camera (behind player, high, tilted down the avenue)
  const aspect = window.innerWidth/window.innerHeight;
  camera = new THREE.PerspectiveCamera(46, aspect, 0.1, 1200);
  camera.position.set(0,13,-25);
  camera.lookAt(0,2,0);

  // ---- éclairage cinématique : blanc premium + accents bleus très légers ----
  scene.add(new THREE.AmbientLight(0x2b3346, 0.75));
  const hemi = new THREE.HemisphereLight(0xbfd4ff, 0x05070d, 0.45);
  scene.add(hemi);

  const key = new THREE.DirectionalLight(0xffffff, 1.0);   // lumière blanche, ombres douces
  key.position.set(26,58,16);
  key.castShadow = true;
  key.shadow.mapSize.set(2048,2048);
  const s = 95;
  key.shadow.camera.left=-s; key.shadow.camera.right=s;
  key.shadow.camera.top=s; key.shadow.camera.bottom=-s;
  key.shadow.camera.near=1; key.shadow.camera.far=260;
  key.shadow.bias=-0.0004;
  key.shadow.radius = 4;   // bords d'ombre adoucis
  scene.add(key);

  const rim = new THREE.DirectionalLight(0x9fd8ff, 0.45);  // accent bleu froid en contre-jour
  rim.position.set(-32,22,-28); scene.add(rim);
  const fill = new THREE.DirectionalLight(0x2a3550, 0.3);  // remplissage doux
  fill.position.set(0,12,-60); scene.add(fill);

  buildSky();
  buildDistantSkyline();
  buildFloor();
  buildGrid();
  buildAvenue();
  DISTRICTS.forEach(buildDistrict);
  buildDecor();
  buildPlayer();

  clock = new THREE.Clock();
  window.addEventListener('resize', onResize);
  animate();
}

/* ============================================================
   CIEL — dôme dégradé futuriste + faisceaux lointains
   ============================================================ */
function buildSky(){
  const skyGeo = new THREE.SphereGeometry(560, 32, 24);
  skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{
      uTime:{value:0},
      topColor:{value:new THREE.Color(0x05070e)},
      bottomColor:{value:new THREE.Color(0x020306)},
      horizonColor:{value:new THREE.Color(0x1b3a5e)}
    },
    vertexShader:`
      varying vec3 vDir;
      void main(){
        vDir = normalize((modelMatrix * vec4(position,1.0)).xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader:`
      precision highp float;
      varying vec3 vDir;
      uniform vec3 topColor, bottomColor, horizonColor;
      uniform float uTime;
      // bruit léger pour casser le banding (brume)
      float hash(vec2 p){ return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5); }
      void main(){
        float h = vDir.y;                              // -1..1
        vec3 base = mix(bottomColor, topColor, smoothstep(-0.25, 0.85, h));
        // halo doux sur l'horizon (lueur de ville lointaine, sobre)
        float glow = exp(-abs(h)*5.0);
        // concentration douce du halo vers l'avant (+Z, derrière la tour)
        float front = smoothstep(-0.2, 1.0, vDir.z) * 0.6 + 0.4;
        base += horizonColor * glow * 0.55 * front;
        // grain subtil
        base += (hash(gl_FragCoord.xy*0.5) - 0.5) * 0.012;
        gl_FragColor = vec4(base, 1.0);
      }`
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  skyMesh = sky;
  scene.add(sky);

  // faisceaux lumineux lointains (projecteurs), lents et discrets
  const cfg = [[-70,150,-0.16],[64,165,0.2],[-110,185,-0.1],[28,210,0.14],[120,175,0.22]];
  cfg.forEach((c,i)=>{
    const geo = new THREE.CylinderGeometry(0.8, 4.0, 260, 10, 1, true);
    const m = new THREE.MeshBasicMaterial({color:0x9fc4ff, transparent:true, opacity:0.05,
      side:THREE.DoubleSide, depthWrite:false, fog:false, blending:THREE.AdditiveBlending});
    const beam = new THREE.Mesh(geo, m);
    beam.position.set(c[0], 70, c[1]);
    beam.rotation.z = c[2];
    beam.userData = {baseRot:c[2], phase:i*1.27, amp:0.06+0.03*(i%2)};
    scene.add(beam);
    skyBeams.push(beam);
  });
}

/* silhouette de ville lointaine -> profondeur visuelle (pure ambiance, non interactif) */
function buildDistantSkyline(){
  const mat = new THREE.MeshStandardMaterial({color:0x070a12, metalness:0.6, roughness:0.5,
    emissive:0x0b1626, emissiveIntensity:0.25});
  const capMat = new THREE.MeshBasicMaterial({color:0x6f9fd0, transparent:true, opacity:0.35, fog:true});
  for(let i=0;i<26;i++){
    const ang = (i/26)*Math.PI*2;
    const rad = 120 + Math.random()*90;
    const px = Math.cos(ang)*rad;
    const pz = 60 + Math.sin(ang)*rad;   // centré un peu vers l'avant
    if(pz < 90 && Math.abs(px) < 60) continue;  // garder l'avenue dégagée
    const bw = 5 + Math.random()*9;
    const bh = 18 + Math.random()*64;
    const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bw), mat);
    b.position.set(px, bh/2, pz);
    scene.add(b);
    // fine corniche lumineuse en haut
    const cap = new THREE.Mesh(new THREE.BoxGeometry(bw*0.9, 0.4, bw*0.9), capMat);
    cap.position.set(px, bh, pz);
    scene.add(cap);
  }
}

/* the guiding showroom avenue: dark premium runway + discrete glowing light lines */
function buildAvenue(){
  const len = 100, cz = 32;   // de l'entrée jusqu'au parvis de la tour
  // bande d'asphalte premium (un peu plus sombre/lisse que le sol)
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(AVENUE_HALF*2+1.5, len),
    new THREE.MeshStandardMaterial({color:0x06070d, metalness:0.9, roughness:0.12}));
  road.rotation.x = -Math.PI/2; road.position.set(0,0.012,cz);
  road.receiveShadow = true;
  scene.add(road);

  // lignes lumineuses longitudinales discrètes (façon showroom)
  const lineMat = (op)=>new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:op, fog:false});
  const lineXs = [-AVENUE_HALF, -3.0, 3.0, AVENUE_HALF];
  lineXs.forEach(x=>{
    const isEdge = Math.abs(x)===AVENUE_HALF;
    const line = new THREE.Mesh(
      new THREE.PlaneGeometry(isEdge?0.14:0.08, len),
      lineMat(isEdge?0.85:0.5));
    line.rotation.x = -Math.PI/2; line.position.set(x,0.05,cz);
    scene.add(line);
  });
  // léger glow central au sol
  const center = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, len),
    new THREE.MeshBasicMaterial({color:0x4fa8d8, transparent:true, opacity:0.07, fog:false}));
  center.rotation.x = -Math.PI/2; center.position.set(0,0.03,cz);
  scene.add(center);

  // bandes lumineuses transversales discrètes à intervalles réguliers
  for(let z=0; z<=68; z+=8){
    const tick = new THREE.Mesh(
      new THREE.PlaneGeometry(AVENUE_HALF*2, 0.06),
      new THREE.MeshBasicMaterial({color:0x7fdfff, transparent:true, opacity:0.22, fog:false}));
    tick.rotation.x = -Math.PI/2; tick.position.set(0,0.04,z);
    scene.add(tick);
  }
}

function edgeLines(geo, color, opacity){
  const e = new THREE.EdgesGeometry(geo);
  const m = new THREE.LineBasicMaterial({color, transparent:true, opacity});
  return new THREE.LineSegments(e, m);
}

function buildDistrict(d){
  const [w,h,dp] = d.size;
  const group = new THREE.Group();
  group.position.set(d.pos[0],0,d.pos[1]);

  if(d.tower) buildTowerMonument(group, d);
  else        buildSimpleBlock(group, d);

  // ground halo (zone d'interaction) — commun
  const hr = d._haloR || Math.max(w,dp)*0.7;
  const halo = new THREE.Mesh(
    new THREE.RingGeometry(hr, hr+0.4, 64),
    new THREE.MeshBasicMaterial({color:d.accent, transparent:true, opacity:0.0, side:THREE.DoubleSide}));
  halo.rotation.x = -Math.PI/2; halo.position.y = 0.06;
  group.add(halo);
  d._halo = halo;

  scene.add(group);
  d._group = group;
  d._radius = d.tower ? 12 : (Math.max(w,dp)*0.7 + 3.2);
  buildings.push(d);
}

    new THREE.BoxGeometry(0.55, 30, 0.18),

    r.position.y = yy; group.add(r); d._redBeacons.push(r);

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();

/* ---- main loop ---- */
const camOffset = new THREE.Vector3(0,13,-19);   // behind (-Z) and above
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if(started && !panelOpen){
    // natural, screen-relative input: up = forward (+Z), right = +X. No rotation.
    let mx=0, mz=0;
    if(keys['arrowup']||keys['z']||keys['w'])   mz+=1;
    if(keys['arrowdown']||keys['s'])            mz-=1;
    if(keys['arrowleft']||keys['q']||keys['a']) mx-=1;
    if(keys['arrowright']||keys['d'])           mx+=1;
    mx += moveVec.x; mz += -moveVec.y;   // joystick: pushing up gives -y -> forward
    mx = -mx;   // camera looks down +Z, so world +X is screen-left -> invert for natural right = right

    if(mx||mz){
      const len = Math.hypot(mx,mz)||1;
      player.position.x += (mx/len)*PLAYER_SPEED*dt;
      player.position.z += (mz/len)*PLAYER_SPEED*dt;
      player.rotation.y = Math.atan2(mx,mz);    // face travel direction (cosmetic)

      // guided corridor — the visitor can never get lost or wander off
      player.position.x = Math.max(-AVENUE_HALF, Math.min(AVENUE_HALF, player.position.x));
      player.position.z = Math.max(Z_MIN, Math.min(Z_MAX, player.position.z));
    }
    checkProximity();
  }

  // third-person follow — fixed orientation, always looking forward down the avenue
  camera.position.lerp(
    new THREE.Vector3(player.position.x+camOffset.x, camOffset.y, player.position.z+camOffset.z), 0.1);
  camera.lookAt(player.position.x, 2.2, player.position.z+7);

  // ambient life
  playerCore.scale.setScalar(1+Math.sin(t*3)*0.06);
  buildings.forEach(b=>{
    if(b._beam){ b._beam.material.opacity = 0.5+Math.sin(t*1.6)*0.22; }
    if(b._orb){
      b._orb.material.opacity = 0.78+Math.sin(t*2.2)*0.2;
      b._orb.scale.setScalar(1+Math.sin(t*2.2)*0.1);
    }
    if(b._glow){
      b._glow.material.opacity = 0.14+Math.sin(t*2.2)*0.08;
      b._glow.scale.setScalar(1+Math.sin(t*2.2)*0.12);
    }
    if(b._redBeacons){
      const on = (Math.sin(t*3.0)>0)?1:0.12;
      b._redBeacons.forEach(rb=> rb.material.opacity = on);
    }
    if(b._halo){
      const target = (activeDistrict===b)?0.55:0.0;
      b._halo.material.opacity += (target-b._halo.material.opacity)*0.15;
      b._halo.rotation.z += 0.004;
    }
    const targetE = (activeDistrict===b)?(b.tower?0.6:0.28):(b.tower?0.32:0.05);
    b._mat.emissiveIntensity += (targetE-b._mat.emissiveIntensity)*0.12;
  });

  // ---- décor vivant ----
  if(skyMesh) skyMesh.position.copy(camera.position);
  if(skyMat) skyMat.uniforms.uTime.value = t;
  skyBeams.forEach(b=>{
    b.rotation.z = b.userData.baseRot + Math.sin(t*0.15 + b.userData.phase)*b.userData.amp;
  });
  drones.forEach(dr=>{
    const u = dr.userData;
    dr.position.y = u.baseY + Math.sin(t*1.1+u.phase)*0.5;
    dr.position.x = u.baseX + Math.sin(t*0.35+u.phase)*u.sx;
    dr.rotation.y += 0.012;
  });
  sculptureRings.forEach((r,i)=>{ r.rotation.z += 0.004*(i+1)*((i%2)?-1:1); });
  if(sculptureCore) sculptureCore.scale.setScalar(1+Math.sin(t*2.5)*0.12);
  towerStrips.forEach((s,i)=>{ s.material.opacity = 0.6+Math.sin(t*1.4+i*0.4)*0.18; });
  if(towerCore) towerCore.material.opacity = 0.85+Math.sin(t*1.8)*0.12;

  renderer.render(scene, camera);
}

/* ---- proximity & prompt ---- */
const promptEl = document.getElementById('prompt');
function checkProximity(){
  let nearest=null, nd=Infinity;
  buildings.forEach(b=>{
    const d=Math.hypot(player.position.x-b.pos[0], player.position.z-b.pos[1]);
    if(d<b._radius && d<nd){ nd=d; nearest=b; }
  });
  if(nearest!==activeDistrict){
    activeDistrict = nearest;
    if(nearest){
      promptEl.querySelector('.pname').textContent = nearest.title;
      promptEl.classList.add('show');
    } else {
      promptEl.classList.remove('show');
    }
  }
}

/* ============================================================
   PANEL
   ============================================================ */
const panel = document.getElementById('panel');
const pbody = document.getElementById('pbody');

function openPanel(d){
  if(!d) return;
  panelOpen = true;
  let html = `<div class="pkicker">${d.label}</div>
    <h1 class="ptitle">${d.title}</h1>
    <p class="psub">${d.sub}</p>`;

  if(d.body) html += d.body;

  if(d.offers){
    d.offers.forEach(o=>{
      html += `<div class="price-row">
        <div><div class="pr-name">${o.n}</div>
          <div class="pr-desc">${o.d}</div>
          ${o.tag?`<span class="pr-tag">${o.tag}</span>`:""}
        </div>
        <div class="pr-price">${o.was?`<s>${o.was}</s>`:""}${o.from?`<span style="font-size:11px;color:#8c8c92;font-family:Sora;font-weight:300">dès </span>`:""}${o.p}${o.per?`<span style="font-size:13px;color:#8c8c92;font-family:Sora;font-weight:300">${o.per}</span>`:""}</div>
      </div>`;
    });
  }

  if(d.bullets){
    html += `<div class="bullets">`+d.bullets.map(b=>`<div>${b}</div>`).join('')+`</div>`;
  }

  // gallery placeholders
  html += `<div class="gcap">${d.galCap||'Portfolio'}</div>
    <div class="gallery">${'<div class="gtile"></div>'.repeat(6)}</div>`;

  if(d.quote){
    const [q,who] = d.quote.split('—');
    html += `<div class="quote">“${q.trim()}”${who?`<span>${who.trim()}</span>`:""}</div>`;
  }

  html += `<div class="actions">
      <a class="btn btn-wa" target="_blank" rel="noopener"
         href="${WA+encodeURIComponent(d.title)}">Discuter sur WhatsApp →</a>
      <a class="btn btn-rdv" href="${MAIL}?subject=${encodeURIComponent('Rendez-vous · '+d.title)}">Prendre rendez-vous</a>
    </div>`;

  pbody.innerHTML = html;
  pbody.scrollTop = 0;
  panel.classList.add('open');
}
function closePanel(){
  panelOpen = false;
  panel.classList.remove('open');
}
panel.querySelector('.pclose').addEventListener('click', closePanel);
promptEl.querySelector('.enter').addEventListener('click', ()=>openPanel(activeDistrict));

/* ============================================================
   INPUT
   ============================================================ */
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k]=true;
  if(k==='e' && started && !panelOpen) openPanel(activeDistrict);
  if(k==='escape') closePanel();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

/* joystick */
const stick = document.getElementById('stick');
const thumb = stick.querySelector('.thumb');
let stickActive=false, stickId=null;
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
if(isTouch){ stick.style.display='block'; }

function stickStart(x,y,id){ stickActive=true; stickId=id; }
function stickMove(x,y){
  if(!stickActive) return;
  const r = stick.getBoundingClientRect();
  let dx = x-(r.left+r.width/2), dy = y-(r.top+r.height/2);
  const max = r.width/2;
  const len = Math.hypot(dx,dy);
  if(len>max){ dx*=max/len; dy*=max/len; }
  thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  moveVec.set(dx/max, dy/max);
}
function stickEnd(){ stickActive=false; stickId=null; moveVec.set(0,0);
  thumb.style.transform='translate(-50%,-50%)'; }

stick.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];stickStart(t.clientX,t.clientY,t.identifier);stickMove(t.clientX,t.clientY);});
window.addEventListener('touchmove',e=>{for(const t of e.changedTouches){if(t.identifier===stickId)stickMove(t.clientX,t.clientY);}},{passive:false});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===stickId)stickEnd();}});
window.addEventListener('touchcancel',stickEnd);

/* ============================================================
   FLOW: intro -> avatar -> city
   ============================================================ */
const introEl = document.getElementById('intro');
const avatarEl = document.getElementById('avatar');
const hudEl = document.getElementById('hud');
const toastEl = document.getElementById('toast');

document.getElementById('discover').addEventListener('click', ()=>{
  introEl.classList.add('hide');
  setTimeout(()=>avatarEl.classList.remove('hide'), 300);
});

document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('click', ()=>{
    window.__avatar = card.dataset.av;
    avatarEl.classList.add('hide');
    setTimeout(()=>{
      initScene();
      hudEl.classList.add('on');
      started = true;
      toastEl.classList.add('show');
      setTimeout(()=>toastEl.classList.remove('show'), 3400);
    }, 700);
  });
});
